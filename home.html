<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Police Dashboard - Home</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #f4f6f9;
    }

    nav {
        background-color: #1b2a49;
        display: flex;
        justify-content: center;
        padding: 15px 0;
    }

    nav a {
        color: #ffd700;
        text-decoration: none;
        margin: 0 20px;
        font-weight: bold;
        font-size: 16px;
    }

    nav a:hover {
        color: white;
    }

    .title {
        text-align: center;
        color: #1b2a49;
        margin-top: 20px;
        font-size: 24px;
        font-weight: bold;
    }

    /* Grid for all cards including dashboard */
    .dashboard-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 20px;
        margin: 30px;
    }

    .card {
        background-color: white;
        border-radius: 10px;
        height: 120px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        font-weight: bold;
        color: #1b2a49;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
        border: 2px solid #1b2a49;
        text-align: center;
        text-decoration: none;
    }

    .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        background-color: #1b2a49;
        color: #ffd700;
    }

    .card-icon {
        font-size: 35px;
        margin-bottom: 8px;
        color: #ffd700;
    }

    .card:hover .card-icon {
        color: white;
    }
</style>
</head>
<body>

<nav>
    <a href="home.html" class="active">Home</a>
    <a href="about_us.html">About Us</a>
    <a href="martyrs.html">Martyrs</a>
    <a href="contact_us.html">Contact Us</a>
</nav>

<div class="title">Police Records Home</div>

<!-- Cards Grid -->
<div class="dashboard-grid">
    <a class="card" href="register_fir.html">
        <div class="card-icon">📝</div>
        Register FIR
    </a>
    <a class="card" href="view_fir.html">
        <div class="card-icon">📄</div>
        View FIRs
    </a>
    <a class="card" href="arrested_persons.html">
        <div class="card-icon">👮</div>
        Arrested Persons
    </a>
     <a class="card" href="dashboard.html">
        <div class="card-icon">📊</div>
        Dashboard
    </a>
    <a class="card" href="search.html">
        <div class="card-icon">📊</div>
       Search Pattern
    </a>
</div>

</body>
</html>

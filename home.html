<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Police Management System | Secure Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-bg: #0f172a;
            --secondary-bg: #1e293b;
            --accent-gold: #fbbf24;
            --accent-blue: #38bdf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --card-hover: #334155;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-main);
            min-height: 100vh;
            background-image: radial-gradient(circle at top right, #1e293b 0%, #0f172a 100%);
        }

        /* Modern Navigation */
        nav {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 5%;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo-area {
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: 1px;
            color: var(--accent-gold);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
        }

        .nav-links a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: 0.3s;
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--accent-blue);
        }

        /* Hero Section */
        .header-section {
            text-align: center;
            padding: 50px 20px 20px;
        }

        .header-section h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-section p {
            color: var(--text-dim);
            font-size: 1.1rem;
        }

        /* Responsive Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 30px;
        }

        /* Card Styling */
        .card {
            background: var(--secondary-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 40px 20px;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--accent-blue);
            transform: scaleX(0);
            transition: transform 0.4s;
        }

        .card:hover {
            transform: translateY(-10px);
            background: var(--card-hover);
            border-color: var(--accent-blue);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .card:hover::before {
            transform: scaleX(1);
        }

        .card-icon {
            font-size: 45px;
            margin-bottom: 15px;
            color: var(--accent-blue);
            transition: 0.3s;
        }

        .card:hover .card-icon {
            color: var(--accent-gold);
            transform: scale(1.1);
        }

        .card-title {
            color: var(--text-main);
            font-size: 1.1rem;
            font-weight: 600;
        }

        /* Subtle Background Decoration */
        .bg-glow {
            position: fixed;
            width: 300px;
            height: 300px;
            background: var(--accent-blue);
            filter: blur(150px);
            opacity: 0.05;
            z-index: -1;
            top: 10%;
            left: 5%;
        }

        @media (max-width: 768px) {
            .nav-links { display: none; }
            .header-section h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

<div class="bg-glow"></div>

<nav>
    <div class="logo-area">
        <i class="fas fa-shield-halved"></i>
        <span>POLICE RECORDS</span>
    </div>
    <div class="nav-links">
        <a href="home.html" class="active">Home</a>
        <a href="about_us.html">About Us</a>
        <a href="martyrs.html">Martyrs</a>
        <a href="contact_us.html">Contact Us</a>
    </div>
</nav>

<div class="header-section">
    <h1>Central Command Dashboard</h1>
    <p>Secure Management System for Law Enforcement Records</p>
</div>

<div class="dashboard-grid">
    <a class="card" href="register_fir.html">
        <i class="fa-solid fa-file-signature card-icon"></i>
        <span class="card-title">Register FIR</span>
    </a>

    <a class="card" href="view_fir.html">
        <i class="fa-solid fa-folder-open card-icon"></i>
        <span class="card-title">View FIRs</span>
    </a>

    <a class="card" href="arrested_persons.html">
        <i class="fa-solid fa-handcuffs card-icon"></i>
        <span class="card-title">Arrested Persons</span>
    </a>

    <a class="card" href="dashboard.html">
        <i class="fa-solid fa-chart-line card-icon"></i>
        <span class="card-title">Analytics Dashboard</span>
    </a>

    <a class="card" href="search.html">
        <i class="fa-solid fa-magnifying-glass-chart card-icon"></i>
        <span class="card-title">Search Pattern</span>
    </a>

    <a class="card" href="crime_hotspot.html">
        <i class="fa-solid fa-map-marked-alt card-icon"></i>
        <span class="card-title">Crime Hotspots</span>
    </a>

</div>

</body>
</html>

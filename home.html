<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Police Management System | Secure Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/home.css">
</head>
<body>

<div class="bg-glow"></div>

<nav>
    <div class="logo-area">
        <i class="fas fa-shield-halved"></i>
        <span>POLICE RECORDS</span>
    </div>
    <div class="nav-links" id="navLinks">
        <a href="home.html" class="active">Home</a>
        <a href="about_us.html">About Us</a>
        <a href="martyrs.html">Martyrs</a>
        <a href="contact_us.html">Contact Us</a>
        
        <div class="user-profile-container">
            <div class="user-info" id="userInfo">
                <i class="fas fa-user-shield"></i>
                <span id="userNameDisplay">Officer</span>
                <i class="fas fa-chevron-down" style="font-size: 10px;"></i>
            </div>
            
            <div class="profile-tooltip" id="profileTooltip">
                <div class="profile-header">
                    <div class="profile-avatar">
                        <i class="fas fa-user-shield"></i>
                    </div>
                    <h4 id="profileName">Loading...</h4>
                    <p id="profileRank">Loading...</p>
                </div>
                <div class="profile-details" id="profileDetails"></div>
            </div>
        </div>
        
        <button class="logout-btn" id="logoutButton">
            <i class="fas fa-sign-out-alt"></i> Logout
        </button>
    </div>
    <button class="mobile-menu-btn" onclick="toggleMenu()">
        <i class="fas fa-bars"></i>
    </button>
</nav>

<div class="header-section">
    <h1 id="welcomeTitle">Central Command Dashboard</h1>
    <p>Secure Management System for Law Enforcement Records</p>
</div>

<div class="dashboard-grid" id="dashboardGrid">
    <div class="card" onclick="navigateTo('register_fir.html')">
        <i class="fa-solid fa-file-signature card-icon"></i>
        <span class="card-title">Register FIR</span>
    </div>
    <div class="card" onclick="navigateTo('view_fir.html')">
        <i class="fa-solid fa-folder-open card-icon"></i>
        <span class="card-title">View FIRs</span>
    </div>
    <div class="card" onclick="navigateTo('arrested_persons.html')">
        <i class="fa-solid fa-handcuffs card-icon"></i>
        <span class="card-title">Arrested Persons</span>
    </div>
    <div class="card" onclick="navigateTo('dashboard.html')">
        <i class="fa-solid fa-chart-line card-icon"></i>
        <span class="card-title">Analytics Dashboard</span>
    </div>
    <div class="card" onclick="navigateTo('search.html')">
        <i class="fa-solid fa-magnifying-glass-chart card-icon"></i>
        <span class="card-title">Search Pattern</span>
    </div>
    <div class="card" onclick="navigateTo('crime_hotspot.html')">
        <i class="fa-solid fa-map-marked-alt card-icon"></i>
        <span class="card-title">Crime Hotspots</span>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="js/home.js"></script>
</body>
</html>

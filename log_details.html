<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Officer Activity Logs | Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/log_details.css">
</head>
<body>

<!-- Admin Access Check -->
<script>
    (function checkAdminAccess() {
        const isLoggedIn = sessionStorage.getItem('isLoggedIn');
        const userRole = sessionStorage.getItem('userRole');
        if (!isLoggedIn || isLoggedIn !== 'true') window.location.replace('index.html');
        if (userRole !== 'admin') { alert('⚠️ Access Denied! This page is only for Administrators.'); window.location.replace('home.html'); }
    })();
</script>

<nav>
    <div class="nav-links">
        <a href="admin_home.html">Home</a>
        <a href="about_us.html">About</a>
        <a href="martyrs.html">Martyrs</a>
        <a href="contact_us.html">Contact</a>
    </div>
</nav>

<div class="container">
    <div class="header">
        <h1><i class="fas fa-history"></i> Officer Activity Logs</h1>
        <p>Real-time login/logout records from Firestore</p>
    </div>

    <div class="card">
        <h2><i class="fas fa-filter"></i> Filter Logs</h2>
        <div class="filter-section">
            <div class="filter-group"><label>From Date</label><input type="date" id="fromDate" class="filter-input"></div>
            <div class="filter-group"><label>To Date</label><input type="date" id="toDate" class="filter-input"></div>
            <div class="filter-group"><label>Officer Name</label><input type="text" id="officerFilter" class="filter-input" placeholder="Search by name..."></div>
            <div class="filter-group"><label>Status</label><select id="statusFilter" class="filter-input"><option value="">All</option><option value="active">Active (Logged In)</option><option value="loggedout">Logged Out</option></select></div>
            <button class="search-btn" onclick="applyFilters()"><i class="fas fa-search"></i> Apply Filters</button>
            <button class="search-btn reset-btn" onclick="resetFilters()"><i class="fas fa-undo"></i> Reset</button>
            <button class="search-btn export-btn" onclick="exportToCSV()"><i class="fas fa-download"></i> Export File</button>
        </div>
    </div>

    <div class="card">
        <h2><i class="fas fa-list"></i> Officer Login/Logout Records</h2>
        <div id="logsContainer"><div class="empty-state"><i class="fas fa-history" style="font-size:48px;margin-bottom:15px;"></i><p>Loading real logs from Firestore...</p></div></div>
        <div id="pagination" class="pagination"></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>
<script src="js/log_details.js"></script>
</body>
</html>

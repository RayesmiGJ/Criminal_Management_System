<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Officer Activity Logs | Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-bg: #0f172a;
            --secondary-bg: #1e293b;
            --accent-gold: #fbbf24;
            --accent-blue: #38bdf8;
            --accent-purple: #a855f7;
            --accent-green: #22c55e;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --glass: rgba(30, 41, 59, 0.7);
            --danger: #ef4444;
            --success: #22c55e;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            color: white;
        }
        nav {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: center;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky; top: 0;
            z-index: 1000;
        }
        nav a {
            color: var(--text-dim);
            text-decoration: none;
            margin: 0 20px;
            font-weight: 600;
            transition: 0.3s;
        }
        nav a:hover,nav a.active { color: var(--accent-gold); }
        .container { max-width: 1400px; margin: 0 auto; padding: 30px 20px; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 2rem; background: linear-gradient(135deg, #fff, var(--accent-blue), var(--accent-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header p { color: var(--text-dim); margin-top: 10px; }
        .card { background: var(--glass); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 25px; margin-bottom: 30px; }
        .card h2 { color: var(--accent-gold); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .filter-section { display: flex; gap: 15px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 20px; }
        .filter-group { display: flex; flex-direction: column; gap: 5px; }
        .filter-group label { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
        .filter-input { padding: 10px 15px; background: #0b1120; border: 1px solid #334155; color: white; border-radius: 8px; font-size: 0.9rem; outline: none; }
        .filter-input:focus { border-color: var(--accent-blue); }
        .search-btn { background: linear-gradient(135deg, var(--accent-blue), #0284c7); color: white; border: none; padding: 10px 25px; border-radius: 8px; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .search-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(56,189,248,0.3); }
        .reset-btn { background: linear-gradient(135deg, #64748b, #475569); }
        .export-btn { background: linear-gradient(135deg, var(--accent-green), #059669); }
        .results-table { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; color: var(--accent-gold); border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 0.85rem; }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); color: var(--text-dim); font-size: 0.85rem; }
        tr:hover td { background: rgba(255,255,255,0.03); color: white; }
        .badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: bold; }
        .badge-active { background: rgba(34,197,94,0.2); color: var(--success); }
        .badge-loggedout { background: rgba(239,68,68,0.2); color: var(--danger); }
        .empty-state { text-align: center; padding: 60px; color: var(--text-dim); }
        .spinner { border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid var(--accent-blue); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .pagination { display: flex; justify-content: center; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
        .page-btn { padding: 8px 15px; background: #0b1120; border: 1px solid #334155; color: white; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .page-btn:hover, .page-btn.active { background: var(--accent-blue); border-color: var(--accent-blue); }
        .page-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        @media (max-width: 768px) {
            .filter-section { flex-direction: column; }
            .filter-group { width: 100%; }
            .search-btn { width: 100%; justify-content: center; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

<!-- Admin Access Check -->
<script>
    (function checkAdminAccess() {
        const isLoggedIn = sessionStorage.getItem('isLoggedIn');
        const userRole = sessionStorage.getItem('userRole');
        if (!isLoggedIn || isLoggedIn !== 'true') window.location.replace('index.html');
        if (userRole !== 'admin') { alert('⚠️ Access Denied! This page is only for Administrators.'); window.location.replace('home.html'); }
    })();
</script>

<nav>
    <div class="nav-links">
        <a href="admin_home.html">Home</a>
        <a href="about_us.html">About</a>
        <a href="martyrs.html">Martyrs</a>
        <a href="contact_us.html">Contact</a>
    </div>
</nav>

<div class="container">
    <div class="header">
        <h1><i class="fas fa-history"></i> Officer Activity Logs</h1>
        <p>Real-time login/logout records from Firestore</p>
    </div>

    <div class="card">
        <h2><i class="fas fa-filter"></i> Filter Logs</h2>
        <div class="filter-section">
            <div class="filter-group"><label>From Date</label><input type="date" id="fromDate" class="filter-input"></div>
            <div class="filter-group"><label>To Date</label><input type="date" id="toDate" class="filter-input"></div>
            <div class="filter-group"><label>Officer Name</label><input type="text" id="officerFilter" class="filter-input" placeholder="Search by name..."></div>
            <div class="filter-group"><label>Status</label><select id="statusFilter" class="filter-input"><option value="">All</option><option value="active">Active (Logged In)</option><option value="loggedout">Logged Out</option></select></div>
            <button class="search-btn" onclick="applyFilters()"><i class="fas fa-search"></i> Apply Filters</button>
            <button class="search-btn reset-btn" onclick="resetFilters()"><i class="fas fa-undo"></i> Reset</button>
            <button class="search-btn export-btn" onclick="exportToCSV()"><i class="fas fa-download"></i> Export File</button>
        </div>
    </div>

    <div class="card">
        <h2><i class="fas fa-list"></i> Officer Login/Logout Records</h2>
        <div id="logsContainer"><div class="empty-state"><i class="fas fa-history" style="font-size:48px;margin-bottom:15px;"></i><p>Loading real logs from Firestore...</p></div></div>
        <div id="pagination" class="pagination"></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script>
    // Firebase config - avoid duplicate declaration by checking if firebase already initialized
    const firebaseConfig = {
        apiKey: "AIzaSyBnMI6S8fig-fl8exIAt5tDz9qWWrWGHAM",
        authDomain: "crime-management-fdd43.firebaseapp.com",
        projectId: "crime-management-fdd43",
        storageBucket: "crime-management-fdd43.appspot.com",
        messagingSenderId: "990509285734",
        appId: "1:990509285734:web:4798f9666ff2dea537c8a7"
    };
    
    // Initialize Firebase only if not already initialized
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    
    // Use a different variable name or check if db already exists in this scope
    let db;
    if (typeof window.firestoreDb === 'undefined') {
        db = firebase.firestore();
        window.firestoreDb = db; // store globally to avoid redeclaration
    } else {
        db = window.firestoreDb;
    }

    let allLogs = [];
    let currentPage = 1;
    const itemsPerPage = 20;

    // Load logs ONLY from Firestore
    async function loadAllLogs() {
        const container = document.getElementById('logsContainer');
        container.innerHTML = '<div class="spinner"></div><div style="text-align:center;">Fetching logs from Firestore...</div>';
        
        try {
            const snapshot = await db.collection('officerLogs')
                .orderBy('loginTime', 'desc')
                .get();
            
            allLogs = [];
            let activeCount = 0;
            let totalDuration = 0;
            let durationCount = 0;
            const officerSet = new Set();
            
            for (const doc of snapshot.docs) {
                const data = doc.data();
                let loginTime = data.loginTime ? data.loginTime.toDate() : null;
                let logoutTime = data.logoutTime ? data.logoutTime.toDate() : null;
                let duration = null;
                if (loginTime && logoutTime) {
                    duration = Math.round((logoutTime - loginTime) / 1000 / 60);
                    totalDuration += duration;
                    durationCount++;
                }
                if (data.status === 'active') activeCount++;
                if (data.officerId) officerSet.add(data.officerId);
                
                allLogs.push({
                    id: doc.id,
                    officerName: data.officerName || 'Unknown',
                    rank: data.rank || 'Officer',
                    phoneNumber: data.phoneNumber || 'N/A',
                    email: data.email || '',
                    loginTime: loginTime,
                    logoutTime: logoutTime,
                    status: data.status || 'loggedout',
                    sessionDuration: duration,
                    officerId: data.officerId,
                    badgeNo: data.badgeNo || '-',
                    division: data.division || '-'
                });
            }
            
            
            // Set default date filters (last 7 days)
            const today = new Date();
            const sevenDaysAgo = new Date();
            sevenDaysAgo.setDate(today.getDate() - 7);
            document.getElementById('fromDate').value = sevenDaysAgo.toISOString().split('T')[0];
            document.getElementById('toDate').value = today.toISOString().split('T')[0];
            
            applyFilters();
        } catch (error) {
            console.error('Firestore error:', error);
            container.innerHTML = `<div class="empty-state"><p style="color: var(--danger);">Error loading logs from Firestore: ${error.message}</p><p>Make sure the "officerLogs" collection exists and you have proper permissions.</p></div>`;
        }
    }

    function applyFilters() {
        const fromDate = document.getElementById('fromDate').value;
        const toDate = document.getElementById('toDate').value;
        const officerFilter = document.getElementById('officerFilter').value.toLowerCase();
        const statusFilter = document.getElementById('statusFilter').value;
        
        let filteredLogs = [...allLogs];
        
        if (fromDate) {
            const from = new Date(fromDate);
            from.setHours(0,0,0,0);
            filteredLogs = filteredLogs.filter(log => log.loginTime && log.loginTime >= from);
        }
        if (toDate) {
            const to = new Date(toDate);
            to.setHours(23,59,59,999);
            filteredLogs = filteredLogs.filter(log => log.loginTime && log.loginTime <= to);
        }
        if (officerFilter) {
            filteredLogs = filteredLogs.filter(log => log.officerName.toLowerCase().includes(officerFilter));
        }
        if (statusFilter) {
            filteredLogs = filteredLogs.filter(log => log.status === statusFilter);
        }
        
        displayLogs(filteredLogs);
    }

    function resetFilters() {
        document.getElementById('fromDate').value = '';
        document.getElementById('toDate').value = '';
        document.getElementById('officerFilter').value = '';
        document.getElementById('statusFilter').value = '';
        applyFilters();
    }

    function displayLogs(logs) {
        const container = document.getElementById('logsContainer');
        const paginationDiv = document.getElementById('pagination');
        
        if (logs.length === 0) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-search" style="font-size:48px;margin-bottom:15px;"></i><p>No logs found for the selected filters</p><p style="font-size:0.8rem;">Try adjusting date range or check if any officers have logged in.</p></div>`;
            paginationDiv.innerHTML = '';
            return;
        }
        
        const totalPages = Math.ceil(logs.length / itemsPerPage);
        const start = (currentPage-1) * itemsPerPage;
        const paginatedLogs = logs.slice(start, start+itemsPerPage);
        
        let html = `<div class="results-table">\<table>\<thead>\<tr>
            <th><i class="fas fa-user"></i> Officer Name</th>
            <th><i class="fas fa-badge"></i> Rank</th>
            <th><i class="fas fa-phone"></i> Phone</th>
            <th><i class="fas fa-sign-in-alt"></i> Login Time</th>
            <th><i class="fas fa-sign-out-alt"></i> Logout Time</th>
            <th><i class="fas fa-hourglass-half"></i> Duration</th>
            <th><i class="fas fa-circle"></i> Status</th>
        </tr></thead><tbody>`;
        
        for (const log of paginatedLogs) {
            const loginStr = log.loginTime ? log.loginTime.toLocaleString() : 'N/A';
            const logoutStr = log.logoutTime ? log.logoutTime.toLocaleString() : (log.status === 'active' ? 'Still Active' : 'N/A');
            const durationStr = log.sessionDuration ? `${log.sessionDuration} min` : (log.status === 'active' ? 'In Progress' : 'N/A');
            
            html += `<tr>
                <td><strong>${escapeHtml(log.officerName)}</strong><br><small style="color:var(--text-dim);">${escapeHtml(log.badgeNo)}</small></td>
                <td>${escapeHtml(log.rank)}</td>
                <td>${escapeHtml(log.phoneNumber)}</td>
                <td>${loginStr}</td>
                <td>${logoutStr}</td>
                <td>${durationStr}</td>
                <td><span class="badge ${log.status === 'active' ? 'badge-active' : 'badge-loggedout'}">${log.status === 'active' ? '🟢 Active' : '🔴 Logged Out'}</span></td>
            </tr>`;
        }
        
        html += `</tbody></table></div>`;
        container.innerHTML = html;
        
        // Pagination
        let pagHtml = '';
        if (totalPages > 1) {
            pagHtml += `<button class="page-btn" onclick="changePage(1)" ${currentPage===1 ? 'disabled' : ''}>&laquo; First</button>`;
            pagHtml += `<button class="page-btn" onclick="changePage(${currentPage-1})" ${currentPage===1 ? 'disabled' : ''}>&lsaquo; Prev</button>`;
            for (let i = Math.max(1, currentPage-2); i <= Math.min(totalPages, currentPage+2); i++) {
                pagHtml += `<button class="page-btn ${i===currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
            }
            pagHtml += `<button class="page-btn" onclick="changePage(${currentPage+1})" ${currentPage===totalPages ? 'disabled' : ''}>Next &rsaquo;</button>`;
            pagHtml += `<button class="page-btn" onclick="changePage(${totalPages})" ${currentPage===totalPages ? 'disabled' : ''}>Last &raquo;</button>`;
        }
        paginationDiv.innerHTML = pagHtml;
    }

    function changePage(page) {
        currentPage = page;
        applyFilters();
    }

    function exportToCSV() {
        const fromDate = document.getElementById('fromDate').value;
        const toDate = document.getElementById('toDate').value;
        const officerFilter = document.getElementById('officerFilter').value.toLowerCase();
        const statusFilter = document.getElementById('statusFilter').value;
        
        let filtered = [...allLogs];
        if (fromDate) { const from = new Date(fromDate); from.setHours(0,0,0,0); filtered = filtered.filter(l => l.loginTime && l.loginTime >= from); }
        if (toDate) { const to = new Date(toDate); to.setHours(23,59,59,999); filtered = filtered.filter(l => l.loginTime && l.loginTime <= to); }
        if (officerFilter) filtered = filtered.filter(l => l.officerName.toLowerCase().includes(officerFilter));
        if (statusFilter) filtered = filtered.filter(l => l.status === statusFilter);
        
        let csv = "\uFEFFOfficer Name,Rank,Phone Number,Login Time,Logout Time,Duration (mins),Status,Badge No,Division\n";
        for (const log of filtered) {
            csv += `"${escapeCsv(log.officerName)}","${escapeCsv(log.rank)}","${escapeCsv(log.phoneNumber)}","${log.loginTime?.toLocaleString()||'N/A'}","${log.logoutTime?.toLocaleString()||(log.status==='active'?'Still Active':'N/A')}","${log.sessionDuration||''}","${log.status}","${escapeCsv(log.badgeNo)}","${escapeCsv(log.division)}"\n`;
        }
        const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `officer_logs_${new Date().toISOString().split('T')[0]}.csv`;
        link.click();
        URL.revokeObjectURL(link.href);
    }

    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    function escapeCsv(str) { if(!str) return ''; return str.replace(/"/g, '""'); }

    // Auto-refresh every 30 seconds
    let refreshInterval;
    function startAutoRefresh() {
        if (refreshInterval) clearInterval(refreshInterval);
        refreshInterval = setInterval(() => { loadAllLogs(); }, 30000);
    }

    document.addEventListener('DOMContentLoaded', () => {
        loadAllLogs();
        startAutoRefresh();
    });
</script>
</body>
</html>

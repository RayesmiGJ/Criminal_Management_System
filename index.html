<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Cloud Crime Records | Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="css/login.css">
</head>
<body>
<div class="overlay"></div>
<h1>🔒 Law Enforcement Portal</h1>
<div class="login-box">
    <div class="role-selector">
        <div class="role-option selected" data-role="officer" onclick="selectRole('officer')">
            <i class="fas fa-user-shield"></i> <span style="font-size: 12px;">Officer Login</span>
        </div>
        <div class="role-option" data-role="admin" onclick="selectRole('admin')">
            <i class="fas fa-user-cog"></i> <span style="font-size: 12px;">Admin Login</span>
        </div>
    </div>
    <div id="officerFields" class="officer-fields">
        <label>👮 Select Officer:</label>
        <select id="officerSelect">
            <option value="">Loading officers...</option>
        </select>
    </div>
    <div id="adminFields" class="admin-fields">
        <label>👑 Admin Username:</label>
        <input type="text" id="adminUsername" placeholder="Enter Admin Username">
        <label>🔑 Admin Password:</label>
        <input type="password" id="adminPassword" placeholder="Enter Admin Password">
    </div>
    <div>
        <label>🔑 Password:</label>
        <input type="password" id="password" placeholder="Enter Password">
    </div>
    <div>
        <label>📝 Captcha:</label>
        <div class="captcha-box">
            <div class="captcha" id="captchaCode"></div>
            <button type="button" class="refresh-captcha" onclick="generateCaptcha()">↻</button>
        </div>
        <input type="text" id="captchaInput" placeholder="Enter Captcha" style="margin-top: 10px;">
    </div>
    <div class="buttons">
        <button class="submit-btn" onclick="validateLogin()">Login</button>
        <button class="clear-btn" onclick="clearForm()">Clear</button>
    </div>
    <div class="error-message" id="errorMessage"></div>
    <div class="info-text">
        <span>Admin Demo:</span> admin|admin123<br>
        <span>Admin can add officers via "Manage Officers" after login.</span>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="js/login.js"></script>
</body>
</html>

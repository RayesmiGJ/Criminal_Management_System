<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Cloud Crime Records | Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        margin: 0;
        font-family: 'Inter', sans-serif;
        background-color: #0f172a;
        background-image: url('images/image.png');
        background-size: cover;
        background-repeat: no-repeat;
        background-position: center;
        color: white;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
    }
    .overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(15, 23, 42, 0.85);
        z-index: -1;
    }
    h1 {
        color: #fbbf24;
        margin-bottom: 20px;
        text-align: center;
        font-size: 30px;
        text-shadow: 0 0 10px rgba(251, 191, 36, 0.3);
    }
    .login-box {
        background-color: rgba(30, 41, 59, 0.95);
        backdrop-filter: blur(10px);
        padding: 35px;
        border-radius: 20px;
        display: flex;
        flex-direction: column;
        gap: 20px;
        width: 400px;
        box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        border: 1px solid rgba(56, 189, 248, 0.3);
    }
    .role-selector {
        display: flex;
        gap: 20px;
        justify-content: center;
        margin-bottom: 10px;
    }
    .role-option {
        display: flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        padding: 8px 20px;
        border-radius: 30px;
        background: rgba(56, 189, 248, 0.1);
        transition: 0.3s;
    }
    .role-option.selected {
        background: linear-gradient(135deg, #38bdf8, #0284c7);
        box-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
    }
    .role-option input { display: none; }
    label {
        font-weight: bold;
        color: #38bdf8;
        font-size: 14px;
        margin-bottom: 5px;
        display: block;
    }
    input, select {
        padding: 12px;
        border-radius: 8px;
        border: 1px solid #334155;
        outline: none;
        font-size: 14px;
        background: #0f172a;
        color: white;
        width: 100%;
        box-sizing: border-box;
    }
    .captcha-box {
        display: flex;
        align-items: center;
        gap: 10px;
    }
    .captcha {
        background: linear-gradient(135deg, #1e293b, #0f172a);
        color: #fbbf24;
        font-weight: bold;
        padding: 12px;
        border-radius: 8px;
        user-select: none;
        font-family: monospace;
        font-size: 20px;
        letter-spacing: 3px;
        text-align: center;
        flex: 1;
        border: 1px solid #38bdf8;
    }
    .refresh-captcha {
        background: #38bdf8;
        color: #0f172a;
        border: none;
        padding: 12px 15px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        transition: 0.3s;
    }
    .buttons {
        display: flex;
        gap: 15px;
        margin-top: 10px;
    }
    button {
        padding: 12px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        flex: 1;
        transition: 0.3s;
    }
    .submit-btn {
        background: linear-gradient(135deg, #38bdf8, #0284c7);
        color: white;
    }
    .clear-btn {
        background: #334155;
        color: white;
    }
    .error-message {
        color: #ef4444;
        font-size: 12px;
        text-align: center;
        margin-top: 10px;
        display: none;
    }
    .info-text {
        text-align: center;
        font-size: 12px;
        color: #94a3b8;
        margin-top: 15px;
        padding-top: 15px;
        border-top: 1px solid #334155;
    }
    .admin-fields { display: none; }
    .officer-fields { display: block; }
    .spinner-small {
        display: inline-block;
        width: 16px;
        height: 16px;
        border: 2px solid rgba(255,255,255,0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
        margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="overlay"></div>
<h1>🔒 Law Enforcement Portal</h1>
<div class="login-box">
    <div class="role-selector">
        <div class="role-option selected" data-role="officer" onclick="selectRole('officer')">
            <i class="fas fa-user-shield"></i> <span style="font-size: 12px;">Officer Login</span>
        </div>
        <div class="role-option" data-role="admin" onclick="selectRole('admin')">
            <i class="fas fa-user-cog"></i> <span style="font-size: 12px;">Admin Login</span>
        </div>
    </div>
    <div id="officerFields" class="officer-fields">
        <label>👮 Select Officer:</label>
        <select id="officerSelect">
            <option value="">Loading officers...</option>
        </select>
    </div>
    <div id="adminFields" class="admin-fields">
        <label>👑 Admin Username:</label>
        <input type="text" id="adminUsername" placeholder="Enter Admin Username">
        <label>🔑 Admin Password:</label>
        <input type="password" id="adminPassword" placeholder="Enter Admin Password">
    </div>
    <div>
        <label>🔑 Password:</label>
        <input type="password" id="password" placeholder="Enter Password">
    </div>
    <div>
        <label>📝 Captcha:</label>
        <div class="captcha-box">
            <div class="captcha" id="captchaCode"></div>
            <button type="button" class="refresh-captcha" onclick="generateCaptcha()">↻</button>
        </div>
        <input type="text" id="captchaInput" placeholder="Enter Captcha" style="margin-top: 10px;">
    </div>
    <div class="buttons">
        <button class="submit-btn" onclick="validateLogin()">Login</button>
        <button class="clear-btn" onclick="clearForm()">Clear</button>
    </div>
    <div class="error-message" id="errorMessage"></div>
    <div class="info-text">
        <span>Admin Demo:</span> admin|admin123<br>
        <span>Admin can add officers via "Manage Officers" after login.</span>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script>
    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyBnMI6S8fig-fl8exIAt5tDz9qWWrWGHAM",
        authDomain: "crime-management-fdd43.firebaseapp.com",
        projectId: "crime-management-fdd43",
        storageBucket: "crime-management-fdd43.appspot.com",
        messagingSenderId: "990509285734",
        appId: "1:990509285734:web:4798f9666ff2dea537c8a7"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let currentRole = 'officer';
    let officersList = []; // store fetched officers

    window.onload = async function() {
        if (sessionStorage.getItem('isLoggedIn') === 'true') {
            window.location.href = "home.html";
        }
        generateCaptcha();
        await loadOfficersFromFirestore();
        document.getElementById('password').addEventListener('keypress', e => { if(e.key === 'Enter') validateLogin(); });
        document.getElementById('captchaInput').addEventListener('keypress', e => { if(e.key === 'Enter') validateLogin(); });
    };

    // Load officers from Firestore
    async function loadOfficersFromFirestore() {
        const selectEl = document.getElementById('officerSelect');
        selectEl.innerHTML = '<option value="">Loading officers...</option>';
        try {
            const snapshot = await db.collection('users').where('role', '==', 'officer').get();
            officersList = [];
            selectEl.innerHTML = '<option value="">-- Select Officer --</option>';
            snapshot.forEach(doc => {
                const data = doc.data();
                officersList.push({ id: doc.id, ...data });
                const option = document.createElement('option');
                option.value = doc.id;
                option.textContent = `${data.name} (${data.rank}, ${data.division})`;
                selectEl.appendChild(option);
            });
            if (officersList.length === 0) {
                selectEl.innerHTML = '<option value="">No officers found. Please ask admin to add.</option>';
            }
        } catch (error) {
            console.error("Error loading officers:", error);
            selectEl.innerHTML = '<option value="">Error loading officers</option>';
        }
    }

    function selectRole(role) {
        currentRole = role;
        document.querySelectorAll('.role-option').forEach(opt => opt.classList.remove('selected'));
        document.querySelector(`.role-option[data-role="${role}"]`).classList.add('selected');
        if(role === 'officer') {
            document.getElementById('officerFields').style.display = 'block';
            document.getElementById('adminFields').style.display = 'none';
        } else {
            document.getElementById('officerFields').style.display = 'none';
            document.getElementById('adminFields').style.display = 'block';
        }
    }

    function generateCaptcha() {
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789abcdefghijklmnopqrstuvwxyz";
        let captcha = "";
        for(let i=0; i<6; i++) captcha += chars.charAt(Math.floor(Math.random() * chars.length));
        document.getElementById("captchaCode").textContent = captcha;
    }

    // Record login in Firestore
    async function recordOfficerLogin(officerData) {
        const record = {
            officerId: officerData.officerId,
            officerName: officerData.name,
            rank: officerData.rank,
            phoneNumber: officerData.phone,
            email: officerData.email,
            loginTime: firebase.firestore.FieldValue.serverTimestamp(),
            status: 'active',
            sessionId: Date.now().toString(),
            badgeNo: officerData.badgeNo,
            division: officerData.division
        };
        try {
            await db.collection('officerLogs').add(record);
            console.log('Login recorded');
        } catch(e) { console.warn('Login record failed', e); }
    }

    async function validateLogin() {
        const captchaInput = document.getElementById("captchaInput").value.trim();
        const captchaCode = document.getElementById("captchaCode").textContent;
        const password = document.getElementById("password").value.trim();
        const errorDiv = document.getElementById("errorMessage");

        errorDiv.style.display = "none";
        if(!password || !captchaInput) {
            errorDiv.textContent = "❌ Please fill all fields!";
            errorDiv.style.display = "block";
            return;
        }
        if(captchaInput !== captchaCode) {
            errorDiv.textContent = "❌ Invalid captcha.";
            errorDiv.style.display = "block";
            generateCaptcha();
            document.getElementById("captchaInput").value = "";
            return;
        }

        if(currentRole === 'admin') {
            const adminUsername = document.getElementById("adminUsername").value.trim();
            if(!adminUsername) {
                errorDiv.textContent = "❌ Please enter admin username!";
                errorDiv.style.display = "block";
                return;
            }
            // Hardcoded admin for simplicity (you can move admin to Firestore too)
            if(adminUsername === "admin" && password === "admin123") {
                sessionStorage.setItem('isLoggedIn', 'true');
                sessionStorage.setItem('userRole', 'admin');
                sessionStorage.setItem('loggedInUser', JSON.stringify({ name:"System Administrator", role:"admin", email:"admin@police.gov.in" }));
                window.location.href = "admin_home.html";
            } else {
                errorDiv.textContent = "❌ Invalid Admin Credentials!";
                errorDiv.style.display = "block";
            }
        } else {
            const selectedDocId = document.getElementById("officerSelect").value;
            if(!selectedDocId) {
                errorDiv.textContent = "❌ Please select an officer!";
                errorDiv.style.display = "block";
                return;
            }
            const officer = officersList.find(o => o.id === selectedDocId);
            if(!officer) {
                errorDiv.textContent = "❌ Officer not found!";
                errorDiv.style.display = "block";
                return;
            }
            // Check password (plain text stored in Firestore for demo)
            if(password === officer.password) {
                // Record login
                await recordOfficerLogin(officer);
                sessionStorage.setItem('isLoggedIn', 'true');
                sessionStorage.setItem('userRole', 'officer');
                sessionStorage.setItem('loggedInUser', JSON.stringify(officer));
                window.location.href = "home.html";
            } else {
                errorDiv.textContent = "❌ Invalid password!";
                errorDiv.style.display = "block";
            }
        }
    }

    function clearForm() {
        document.getElementById("officerSelect").value = "";
        document.getElementById("password").value = "";
        document.getElementById("captchaInput").value = "";
        document.getElementById("adminUsername").value = "";
        document.getElementById("adminPassword").value = "";
        generateCaptcha();
        document.getElementById("errorMessage").style.display = "none";
    }
</script>
</body>
</html>

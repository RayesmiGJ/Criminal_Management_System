<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Police Analytics | SecureCloud Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-bg: #0f172a;
            --secondary-bg: #1e293b;
            --accent-gold: #fbbf24;
            --accent-blue: #38bdf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --glass: rgba(30, 41, 59, 0.7);
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-main);
            min-height: 100vh;
            background-image: radial-gradient(circle at top right, #1e293b 0%, #0f172a 100%);
            background-attachment: fixed;
        }

        /* Navbar */
        nav {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: center;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky; top: 0; z-index: 1000;
        }

        nav a {
            color: var(--text-dim);
            text-decoration: none;
            margin: 0 20px;
            font-weight: 600;
            transition: 0.3s;
        }

        nav a:hover, nav a.active { color: var(--accent-gold); }

        .title {
            text-align: center;
            padding: 40px 0 10px;
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(to right, #fff, var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            text-align: center;
            color: var(--text-dim);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        /* Grid Layout */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 30px 50px 30px;
        }

        .chart-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            transition: 0.3s;
        }

        .chart-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-blue);
        }

        .chart-card h3 {
            text-align: center;
            margin-bottom: 20px;
            color: var(--accent-gold);
            font-size: 1.1rem;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        canvas {
            width: 100% !important;
            height: 300px !important;
        }

        @media (max-width: 900px) {
            .charts-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<script src="auth-check.js"></script>
<nav>
    <a href="home.html">Home</a>
    <a href="about_us.html">About Us</a>
    <a href="martyrs.html">Martyrs</a>
    <a href="contact_us.html">Contact Us</a>
</nav>

<div class="title">Command Center Analytics</div>
<div class="subtitle">Live Intelligence & Data Visualization</div>

<div class="charts-grid">
    <div class="chart-card">
        <h3><i class="fas fa-folder-open"></i> FIRs by Crime Category</h3>
        <canvas id="categoryChart"></canvas>
    </div>
    
    <div class="chart-card">
        <h3><i class="fas fa-signal"></i> Case Status Distribution</h3>
        <canvas id="statusChart"></canvas>
    </div>

    <div class="chart-card">
        <h3><i class="fas fa-chart-line"></i> Monthly FIR Trends</h3>
        <canvas id="monthlyTrendChart"></canvas>
    </div>

    <div class="chart-card">
        <h3><i class="fas fa-user-secret"></i> Intelligence Breakdown</h3>
        <canvas id="criminalSuspectChart"></canvas>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<script>
    // Firebase Config (Keep original)
    const firebaseConfig = {
        apiKey: "AIzaSyBnMI6S8fig-fl8exIAt5tDz9qWWrWGHAM",
        authDomain: "crime-management-fdd43.firebaseapp.com",
        projectId: "crime-management-fdd43",
        storageBucket: "crime-management-fdd43.firebasestorage.app",
        messagingSenderId: "990509285734",
        appId: "1:990509285734:web:4798f9666ff2dea537c8a7",
        measurementId: "G-QTG266883M"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let charts = {};

    async function loadDashboardData() {
        const snapshot = await db.collection("firs").get();
        const firs = snapshot.docs.map(doc => doc.data());
        renderCharts(firs);
    }

    function renderCharts(firs) {
        // Global Chart Defaults
        Chart.defaults.color = '#94a3b8';
        Chart.defaults.font.family = "'Inter', sans-serif";

        // 1. FIR Category Chart (Bar)
        const catData = {};
        firs.forEach(f => {
            const c = f.category || 'Unknown';
            catData[c] = (catData[c] || 0) + 1;
        });
        charts.cat = new Chart(document.getElementById('categoryChart'), {
            type: 'bar',
            data: {
                labels: Object.keys(catData),
                datasets: [{
                    label: 'Records',
                    data: Object.values(catData),
                    backgroundColor: '#38bdf8',
                    borderRadius: 10
                }]
            },
            options: {
                plugins: { legend: { display: false } },
                scales: { 
                    y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' } },
                    x: { grid: { display: false } }
                }
            }
        });

        // 2. Case Status Chart (Doughnut)
        const statusData = {
            'Pending': firs.filter(f => !f.status || f.status === 'Pending').length,
            'Arrested': firs.filter(f => f.status === 'Arrested').length,
            'Closed': firs.filter(f => f.status === 'Case Closed').length
        };
        charts.status = new Chart(document.getElementById('statusChart'), {
            type: 'doughnut',
            data: {
                labels: Object.keys(statusData),
                datasets: [{
                    data: Object.values(statusData),
                    backgroundColor: ['#ef4444', '#38bdf8', '#fbbf24'],
                    borderWidth: 0,
                    hoverOffset: 15
                }]
            },
            options: {
                cutout: '70%',
                plugins: { legend: { position: 'bottom' } }
            }
        });

        // 3. Monthly Trend (Line)
        const months = { 'Jan':0, 'Feb':0, 'Mar':0, 'Apr':0, 'May':0, 'Jun':0, 'Jul':0, 'Aug':0, 'Sep':0, 'Oct':0, 'Nov':0, 'Dec':0 };
        firs.forEach(f => {
            const date = f.date ? new Date(f.date) : null;
            if (date && !isNaN(date.getTime())) {
                months[date.toLocaleString('default', { month: 'short' })]++;
            }
        });
        charts.trend = new Chart(document.getElementById('monthlyTrendChart'), {
            type: 'line',
            data: {
                labels: Object.keys(months),
                datasets: [{
                    label: 'FIR Volume',
                    data: Object.values(months),
                    borderColor: '#fbbf24',
                    backgroundColor: 'rgba(251, 191, 36, 0.1)',
                    fill: true,
                    tension: 0.4,
                    pointBackgroundColor: '#fbbf24'
                }]
            },
            options: {
                scales: { y: { grid: { color: 'rgba(255,255,255,0.05)' } } }
            }
        });

        // 4. Intelligence Breakdown (Pie)
        const intel = { 'Criminal Known': 0, 'Suspect Identified': 0, 'Blind Cases': 0 };
        firs.forEach(f => {
            if(f.criminalKnown==='Yes') intel['Criminal Known']++;
            else if(f.suspectKnown==='Yes') intel['Suspect Identified']++;
            else intel['Blind Cases']++;
        });
        charts.intel = new Chart(document.getElementById('criminalSuspectChart'), {
            type: 'pie',
            data: {
                labels: Object.keys(intel),
                datasets: [{
                    data: Object.values(intel),
                    backgroundColor: ['#38bdf8', '#818cf8', '#334155'],
                    borderWidth: 0
                }]
            },
            options: {
                plugins: { legend: { position: 'bottom' } }
            }
        });
    }

    window.onload = loadDashboardData;
</script>

</body>
</html>

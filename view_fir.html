<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case Management | SecureCloud Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/view_fir.css">
  </head>
<body>
<script src="auth-check.js"></script>
<nav>
    <a href="home.html">Home</a>
    <a href="about_us.html">About Us</a>
    <a href="martyrs.html">Martyrs</a>
    <a href="contact_us.html">Contact Us</a>
</nav>

<div class="container">
    <h2><i class="fas fa-database"></i> FIR Database Explorer</h2>
    <div class="search-filter">
        <input type="text" id="searchInput" placeholder="Search by Reference ID or Victim Name..." onkeyup="filterTable()">
        <select id="categoryFilter" onchange="filterByCategory()">
            <option value="">Filter by Category</option>
        </select>
    </div>
    <div class="table-wrapper">
        <table id="firTable">
            <thead><tr><th>Ref ID</th><th>Date</th><th>Category</th><th>Victim Name</th><th>Contact</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<!-- Details Modal (line-by-line layout) -->
<div class="modal" id="detailsModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3><i class="fas fa-file-alt"></i> Complete Case Details</h3>
            <button class="close-modal" onclick="closeModal()">&times;</button>
        </div>
        <div id="modalBody"></div>
    </div>
</div>

<!-- Edit Modal (unchanged functionality) -->
<div class="modal" id="editModal">
    <div class="modal-content" id="editModalContent">
        <div class="modal-header">
            <h3><i class="fas fa-edit"></i> Edit Case: <span id="editRefNo"></span></h3>
            <button class="close-modal" onclick="closeEditModal()">&times;</button>
        </div>
        <div id="editFormContainer"></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>

<script src="js/view_fir.js"></script>
</body>
</html>

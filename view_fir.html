<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View FIR Records | SecureCloud Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-bg: #0f172a;
            --secondary-bg: #1e293b;
            --accent-gold: #fbbf24;
            --accent-blue: #38bdf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --glass: rgba(30, 41, 59, 0.7);
            --danger: #ef4444;
            --success: #22c55e;
            --warning: #f59e0b;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-main);
            min-height: 100vh;
            background-image: radial-gradient(circle at top right, #1e293b 0%, #0f172a 100%);
            background-attachment: fixed;
        }

        /* Navigation */
        nav {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: center;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav a {
            color: var(--text-dim);
            text-decoration: none;
            margin: 0 20px;
            font-weight: 600;
            font-size: 15px;
            transition: 0.3s;
        }

        nav a:hover, nav a.active {
            color: var(--accent-gold);
        }

        h2 {
            text-align: center;
            padding: 40px 0 10px;
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(to right, #fff, var(--accent-blue));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Filters */
        .search-filter {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            background: var(--glass);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        input, select {
            background: #0b1120;
            border: 1px solid #334155;
            color: white;
            padding: 12px;
            border-radius: 8px;
            outline: none;
            flex: 1;
        }

        input:focus { border-color: var(--accent-blue); }

        /* Table Styling */
        .table-wrapper {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: rgba(255, 255, 255, 0.05);
            color: var(--accent-gold);
            padding: 18px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }

        td {
            padding: 15px 18px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--text-dim);
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.02);
            color: white;
        }

        .refCol {
            color: var(--accent-blue);
            font-weight: 600;
            cursor: pointer;
            text-decoration: underline;
        }

        /* Status Pills */
        .status-pending { color: var(--warning); font-weight: 700; }
        .status-arrested { color: var(--success); font-weight: 700; }
        .status-closed { color: #94a3b8; font-weight: 700; }

        .btn {
            padding: 8px 16px;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-update {
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent-blue);
            border: 1px solid var(--accent-blue);
        }

        .btn-update:hover {
            background: var(--accent-blue);
            color: #000;
        }

        /* Modals */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal-content {
            background: var(--secondary-bg);
            padding: 30px;
            border-radius: 20px;
            max-width: 550px;
            width: 90%;
            border: 1px solid var(--accent-blue);
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.2);
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-gold);
            margin-bottom: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }

        .input-field {
            margin-top: 10px;
            margin-bottom: 15px;
            width: 100%;
            background: #0f172a;
        }

        .modal-footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        #modalBody p {
            margin: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 5px;
        }

        #modalBody strong { color: var(--accent-blue); }
        
        /* Person details styling */
        .person-section {
            margin-top: 20px;
            border-top: 1px solid #334155;
            padding-top: 15px;
        }
        
        .person-title {
            color: var(--accent-gold);
            font-size: 1.2rem;
            margin-bottom: 15px;
        }
        
        .person-card {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            border-left: 3px solid var(--accent-blue);
        }
        
        .person-card h4 {
            color: var(--accent-blue);
            margin: 0 0 10px 0;
            font-size: 1rem;
        }
        
        .person-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        
        .person-grid p {
            margin: 5px 0;
            border-bottom: none;
        }
        
        @media (max-width: 768px) {
            .person-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<script src="auth-check.js"></script>
<nav>
    <a href="home.html">Home</a>
    <a href="about_us.html">About Us</a>
    <a href="martyrs.html">Martyrs</a>
    <a href="contact_us.html">Contact Us</a>
</nav>

<div class="container">
    <h2><i class="fas fa-database"></i> FIR Database Explorer</h2>
    
    <div class="search-filter">
        <input type="text" id="searchInput" placeholder="Search by Reference ID or Victim Name..." onkeyup="filterTable()">
        <select id="categoryFilter" onchange="filterByCategory()">
            <option value="">Filter by Category</option>
        </select>
    </div>

    <div class="table-wrapper">
        <table id="firTable">
            <thead>
                <tr>
                    <th><i class="fas fa-hashtag"></i> Reference ID</th>
                    <th><i class="fas fa-calendar-alt"></i> Date</th>
                    <th><i class="fas fa-folder"></i> Category</th>
                    <th><i class="fas fa-user"></i> Victim Name</th>
                    <th><i class="fas fa-phone"></i> Contact</th>
                    <th><i class="fas fa-info-circle"></i> Status</th>
                    <th><i class="fas fa-edit"></i> Actions</th>
                </tr>
            </thead>
            <tbody>
                <!-- Data will be loaded here -->
            </tbody>
        </table>
    </div>
</div>

<!-- Details Modal -->
<div class="modal" id="detailsModal">
    <div class="modal-content">
        <div class="modal-header"><i class="fas fa-file-alt"></i> Full Case File</div>
        <div id="modalBody"></div>
        <div class="modal-footer">
            <button class="btn btn-update" onclick="closeModal()" style="background: transparent;">Close Portal</button>
        </div>
    </div>
</div>

<!-- Update Modal -->
<div class="modal" id="updateModal">
    <div class="modal-content">
        <div class="modal-header"><i class="fas fa-sync-alt"></i> Update Investigation Status</div>
        <div id="updateBody"></div>
        <div class="modal-footer">
            <button class="btn btn-update" onclick="saveUpdate()" style="background: var(--success); color: white; border: none;">Apply Changes</button>
            <button class="btn btn-update" onclick="closeUpdateModal()" style="background: transparent;">Cancel</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBnMI6S8fig-fl8exIAt5tDz9qWWrWGHAM",
        authDomain: "crime-management-fdd43.firebaseapp.com",
        projectId: "crime-management-fdd43",
        storageBucket: "crime-management-fdd43.appspot.com",
        messagingSenderId: "990509285734",
        appId: "1:990509285734:web:4798f9666ff2dea537c8a7"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let selectedRecord = null;
    let selectedDocId = '';

    // ============= LOAD FIR DATA (Handles both old and new formats) =============
    async function loadFIRData() {
        let tableBody = document.querySelector("#firTable tbody");
        tableBody.innerHTML = "<tr><td colspan='7' style='text-align:center;'>Decrypting Database...</td></tr>";
        let categories = new Set();
        
        try {
            const snapshot = await db.collection("firs").get();
            tableBody.innerHTML = "";

            snapshot.forEach(doc => {
                let record = doc.data();
                let statusClass = getStatusClass(record.status);
                
                // Handle BOTH old and new data formats for victim name and contact
                let victimName = '';
                let victimContact = '';
                
                // Check if it's new format (has victims array)
                if (record.victims && record.victims.length > 0) {
                    victimName = record.victims[0].name || '';
                    victimContact = record.victims[0].contact || '';
                } 
                // Check if it's old format (has flat victim fields)
                else if (record.victimName) {
                    victimName = record.victimName;
                    victimContact = record.victimContact || '';
                }
                // Check for criminal details (some old records might have this)
                else if (record.criminalDetails) {
                    victimName = record.criminalDetails.name || 'Unknown';
                }
                
                let row = document.createElement("tr");
                row.innerHTML = `
                    <td class="refCol">${record.refID || record.refNo || ''}</td>
                    <td>${record.date || ''}</td>
                    <td>${record.category || ''}</td>
                    <td>${victimName}</td>
                    <td>${victimContact}</td>
                    <td><span class="${statusClass}">${record.status || 'Pending'}</span></td>
                    <td><button class="btn btn-update" onclick="openUpdateModal('${doc.id}','${record.refID || record.refNo}')">Update</button></td>
                `;
                row.querySelector('.refCol').onclick = () => showDetails(record);
                tableBody.appendChild(row);
                if(record.category) categories.add(record.category);
            });

            // Populate category filter
            let categoryFilter = document.getElementById("categoryFilter");
            categoryFilter.innerHTML = '<option value="">All Categories</option>';
            categories.forEach(cat => {
                let opt = document.createElement("option");
                opt.value = cat;
                opt.textContent = cat;
                categoryFilter.appendChild(opt);
            });
            
        } catch (error) {
            console.error("Error loading FIRs:", error);
            tableBody.innerHTML = "<tr><td colspan='7' style='text-align:center; color: #ef4444;'>Error loading data. Please refresh.</td></tr>";
        }
    }

    function getStatusClass(status) {
        if(status === 'Pending') return 'status-pending';
        if(status === 'Arrested') return 'status-arrested';
        if(status === 'Case Closed') return 'status-closed';
        return '';
    }

    function filterTable() {
        let searchValue = document.getElementById("searchInput").value.toLowerCase();
        let rows = document.querySelectorAll("#firTable tbody tr");
        rows.forEach(row => {
            let ref = row.cells[0].textContent.toLowerCase();
            let name = row.cells[3].textContent.toLowerCase();
            row.style.display = (ref.includes(searchValue) || name.includes(searchValue)) ? "" : "none";
        });
    }

    function filterByCategory() {
        let selected = document.getElementById("categoryFilter").value.toLowerCase();
        let rows = document.querySelectorAll("#firTable tbody tr");
        rows.forEach(row => {
            let category = row.cells[2].textContent.toLowerCase();
            row.style.display = !selected || category === selected ? "" : "none";
        });
    }

    // ============= SHOW DETAILS (Handles both old and new formats) =============
    function showDetails(record) {
        let body = `
            <p><strong>Reference ID:</strong> ${record.refNo || record.refID || ''}</p>
            <p><strong>Date:</strong> ${record.date || ''}</p>
            <p><strong>Category:</strong> ${record.category || ''}</p>
            <p><strong>Incident Location:</strong> ${record.incidentLocation || ''}</p>
            <p><strong>Incident Description:</strong> ${record.incidentDescription || ''}</p>
            <p><strong>Complaint Statement:</strong> ${record.complaint || ''}</p>
            <p><strong>Property Seizure:</strong> ${record.propertySeizure || 'None'}</p>
            <p><strong>Investigation Status:</strong> <span class="${getStatusClass(record.status)}">${record.status || 'Pending'}</span></p>
        `;

        // Handle VICTIMS - both old and new format
        if (record.victims && record.victims.length > 0) {
            // NEW FORMAT: victims array
            body += `<div class="person-section"><h3 class="person-title"><i class="fas fa-user-injured"></i> Victim Details</h3>`;
            record.victims.forEach((victim, index) => {
                body += `
                    <div class="person-card">
                        <h4>Victim ${index + 1}</h4>
                        <div class="person-grid">
                            <p><strong>Name:</strong> ${victim.name || 'N/A'}</p>
                            <p><strong>Age:</strong> ${victim.age || 'N/A'}</p>
                            <p><strong>Contact:</strong> ${victim.contact || 'N/A'}</p>
                            <p><strong>Address:</strong> ${victim.address || 'N/A'}</p>
                            <p><strong>ID Proof:</strong> ${victim.idProof || 'N/A'}</p>
                            <p><strong>Occupation:</strong> ${victim.occupation || 'N/A'}</p>
                        </div>
                    </div>
                `;
            });
            body += `</div>`;
        } 
        else if (record.victimName) {
            // OLD FORMAT: flat victim fields
            body += `<div class="person-section"><h3 class="person-title"><i class="fas fa-user-injured"></i> Victim Details</h3>`;
            body += `
                <div class="person-card">
                    <h4>Victim</h4>
                    <div class="person-grid">
                        <p><strong>Name:</strong> ${record.victimName || 'N/A'}</p>
                        <p><strong>Age:</strong> ${record.victimAge || 'N/A'}</p>
                        <p><strong>Contact:</strong> ${record.victimContact || 'N/A'}</p>
                        <p><strong>Address:</strong> ${record.victimAddress || 'N/A'}</p>
                        <p><strong>ID Proof:</strong> ${record.victimIdProof || 'N/A'}</p>
                        <p><strong>Occupation:</strong> ${record.victimOccupation || 'N/A'}</p>
                    </div>
                </div>
            `;
            body += `</div>`;
        }

        // Handle WITNESSES - both old and new format
        if (record.witnesses && record.witnesses.length > 0) {
            // NEW FORMAT: witnesses array
            body += `<div class="person-section"><h3 class="person-title"><i class="fas fa-user"></i> Witness Details</h3>`;
            record.witnesses.forEach((witness, index) => {
                body += `
                    <div class="person-card">
                        <h4>Witness ${index + 1}</h4>
                        <div class="person-grid">
                            <p><strong>Name:</strong> ${witness.name || 'N/A'}</p>
                            <p><strong>Age:</strong> ${witness.age || 'N/A'}</p>
                            <p><strong>Contact:</strong> ${witness.contact || 'N/A'}</p>
                            <p><strong>Address:</strong> ${witness.address || 'N/A'}</p>
                            <p><strong>Statement:</strong> ${witness.statement || 'N/A'}</p>
                        </div>
                    </div>
                `;
            });
            body += `</div>`;
        }

        // Handle SUSPECTS - both old and new format
        if (record.suspects && record.suspects.length > 0) {
            // NEW FORMAT: suspects array
            body += `<div class="person-section"><h3 class="person-title"><i class="fas fa-user-secret"></i> Suspect Details</h3>`;
            record.suspects.forEach((suspect, index) => {
                body += `
                    <div class="person-card">
                        <h4>Suspect ${index + 1}</h4>
                        <div class="person-grid">
                            <p><strong>Name:</strong> ${suspect.name || 'N/A'}</p>
                            <p><strong>Age:</strong> ${suspect.age || 'N/A'}</p>
                            <p><strong>Gender:</strong> ${suspect.gender || 'N/A'}</p>
                            <p><strong>Height:</strong> ${suspect.height || 'N/A'}</p>
                            <p><strong>Build:</strong> ${suspect.build || 'N/A'}</p>
                            <p><strong>Marks:</strong> ${suspect.marks || 'N/A'}</p>
                            <p><strong>Last Seen:</strong> ${suspect.lastSeen || 'N/A'}</p>
                        </div>
                    </div>
                `;
            });
            body += `</div>`;
        }

        // Handle CRIMINALS - both old and new format
        if (record.criminals && record.criminals.length > 0) {
            // NEW FORMAT: criminals array
            body += `<div class="person-section"><h3 class="person-title"><i class="fas fa-skull-crosswalk"></i> Criminal Details</h3>`;
            record.criminals.forEach((criminal, index) => {
                body += `
                    <div class="person-card">
                        <h4>Criminal ${index + 1}</h4>
                        <div class="person-grid">
                            <p><strong>Name:</strong> ${criminal.name || 'N/A'}</p>
                            <p><strong>Alias:</strong> ${criminal.alias || 'N/A'}</p>
                            <p><strong>Age:</strong> ${criminal.age || 'N/A'}</p>
                            <p><strong>Gender:</strong> ${criminal.gender || 'N/A'}</p>
                            <p><strong>Address:</strong> ${criminal.address || 'N/A'}</p>
                            <p><strong>Previous Record:</strong> ${criminal.record || 'N/A'}</p>
                        </div>
                    </div>
                `;
            });
            body += `</div>`;
        }
        // Handle old criminalDetails format
        else if (record.criminalDetails) {
            body += `<div class="person-section"><h3 class="person-title"><i class="fas fa-skull-crosswalk"></i> Criminal Details</h3>`;
            body += `
                <div class="person-card">
                    <h4>Criminal</h4>
                    <div class="person-grid">
                        <p><strong>Name:</strong> ${record.criminalDetails.name || record.criminalDetails.cName || 'N/A'}</p>
                        <p><strong>Age:</strong> ${record.criminalDetails.age || record.criminalDetails.cAge || 'N/A'}</p>
                        <p><strong>Address:</strong> ${record.criminalDetails.address || record.criminalDetails.cAddress || 'N/A'}</p>
                        <p><strong>Marks:</strong> ${record.criminalDetails.marks || record.criminalDetails.cMarks || 'N/A'}</p>
                        <p><strong>Extra:</strong> ${record.criminalDetails.extra || record.criminalDetails.cExtra || 'N/A'}</p>
                    </div>
                </div>
            `;
            body += `</div>`;
        }

        // Add Judgement if case is closed
        if (record.status === 'Case Closed' && record.judgement) {
            body += `
                <div class="person-section">
                    <h3 class="person-title"><i class="fas fa-gavel"></i> Court Judgement</h3>
                    <div class="person-card">
                        <p style="font-style: italic;">${record.judgement}</p>
                    </div>
                </div>
            `;
        }

        document.getElementById("modalBody").innerHTML = body;
        document.getElementById("detailsModal").style.display = "flex";
    }

    function closeModal() { 
        document.getElementById("detailsModal").style.display = "none"; 
    }

    // ============= UPDATE FUNCTIONS =============
    function openUpdateModal(docId, refId) {
        selectedDocId = docId;
        db.collection("firs").doc(docId).get().then(doc => {
            selectedRecord = doc.data();
            let status = selectedRecord.status || 'Pending';
            let html = `<p><strong>Updating Case:</strong> ${refId}</p>`;
            
            if(status === 'Pending'){
                html += `
                    <label>Criminal Apprehended?</label>
                    <select id="criminalFound" class="input-field">
                        <option value="">Select Status</option>
                        <option value="Yes">Yes (Arrested)</option>
                        <option value="No">No (Still Pending)</option>
                    </select>
                    <div id="criminalDetailsDiv" style="display:none; background:rgba(255,255,255,0.05); padding:15px; border-radius:10px;">
                        <input id="cName" class="input-field" placeholder="Full Legal Name">
                        <input id="cAge" class="input-field" placeholder="Criminal Age">
                        <input id="cAddress" class="input-field" placeholder="Current Address">
                        <input id="cMarks" class="input-field" placeholder="Identification Marks">
                        <textarea id="cExtra" class="input-field" placeholder="Additional Field Notes"></textarea>
                    </div>
                `;
            } else if(status === 'Arrested'){
                html += `
                    <label>Final Judicial Verdict:</label>
                    <textarea id="judgement" class="input-field" placeholder="Enter Court Judgment and Sentence Details..."></textarea>
                `;
            } else {
                html += `<p style="color:var(--text-dim);">This case is formally closed. No further updates permitted.</p>`;
            }
            
            document.getElementById("updateBody").innerHTML = html;
            document.getElementById("updateModal").style.display = "flex";

            if(status === 'Pending'){
                document.getElementById("criminalFound").onchange = function(){
                    document.getElementById("criminalDetailsDiv").style.display = this.value === 'Yes' ? 'block' : 'none';
                }
            }
        });
    }

    async function saveUpdate() {
        let status = selectedRecord.status || 'Pending';
        let updateData = {};
        
        try {
            if(status === 'Pending'){
                let found = document.getElementById("criminalFound").value;
                if(found === 'Yes'){
                    let cName = document.getElementById("cName").value.trim();
                    let cAge = document.getElementById("cAge").value.trim();
                    let cAddress = document.getElementById("cAddress").value.trim();
                    let cMarks = document.getElementById("cMarks").value.trim();
                    let cExtra = document.getElementById("cExtra").value.trim();
                    
                    if(!cName || !cAge || !cAddress){ 
                        alert("Essential criminal metadata required."); 
                        return; 
                    }
                    
                    updateData.status = 'Arrested';
                    updateData.criminalDetails = {
                        name: cName, 
                        age: cAge, 
                        address: cAddress, 
                        marks: cMarks, 
                        extra: cExtra
                    };
                    
                    // Add to criminals array for new format
                    updateData.criminals = [{
                        name: cName,
                        age: cAge,
                        address: cAddress,
                        marks: cMarks,
                        extra: cExtra
                    }];
                    
                } else {
                    document.getElementById("updateModal").style.display = "none";
                    return;
                }
            } else if(status === 'Arrested'){
                let judgement = document.getElementById("judgement").value.trim();
                if(judgement === ''){ 
                    alert("Judicial documentation required to close case."); 
                    return; 
                }
                updateData.status = 'Case Closed';
                updateData.judgement = judgement;
            }
            
            await db.collection("firs").doc(selectedDocId).update(updateData);
            document.getElementById("updateModal").style.display = "none";
            loadFIRData(); // Reload the table
            
        } catch (error) {
            console.error("Error updating FIR:", error);
            alert("Error updating record: " + error.message);
        }
    }

    function closeUpdateModal() { 
        document.getElementById("updateModal").style.display = "none"; 
    }

    // Initialize on page load
    window.onload = loadFIRData;
</script>

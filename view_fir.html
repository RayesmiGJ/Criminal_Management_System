<!DOCTYPE html>
<html>
<head>
    <title>View FIR Records</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f8f8f8;
            margin: 0;
            padding: 0;
        }
        h2 {
            text-align: center;
            padding-top: 10px;
            color: #1b2a49;
            margin: 0;
        }
        .container {
            padding: 20px;
        }
        .search-filter {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        input, select, button {
            padding: 8px;
            font-size: 14px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background: #1b2a49;
            color: white;
        }
        tr:hover {
            background: #e1b7b7;
        }
        .status-pending { background-color: rgb(228, 122, 10); font-weight: bold; }
        .status-arrested { color: green; font-weight: bold; }
        .status-closed { color: gray; font-weight: bold; }
        .btn {
            padding: 5px 10px;
            cursor: pointer;
            font-size: 13px;
            border: none;
            border-radius: 4px;
        }
        .btn-update { background: #3498db; color: white; }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 6px;
            max-width: 500px;
            width: 90%;
        }
        .modal-header { font-weight: bold; margin-bottom: 10px; text-align:center; }
        .modal-footer { margin-top: 15px; text-align: right; }
        .input-field { margin-bottom: 10px; width: 100%; padding:5px; }

         nav {
        background-color: #1b2a49;
        display: flex;
        justify-content: center;
        padding: 15px 0;
    }
    nav a {
        color: #ffd700;
        text-decoration: none;
        margin: 0 20px;
        font-weight: bold;
        font-size: 16px;
    }

    nav a:hover {
        color: white;
    }
    </style>
</head>
<body>
    <nav>
    <a href="home.html" class="active">Home</a>
    <a href="about_us.html">About Us</a>
    <a href="martyrs.html">Martyrs</a>
    <a href="contact_us.html">Contact Us</a>
</nav>

    <h2>View FIR Records</h2>
    <div class="container">
        <div class="search-filter">
            <input type="text" id="searchInput" placeholder="Search by Reference ID or Victim Name" onkeyup="filterTable()">
            <select id="categoryFilter" onchange="filterByCategory()">
                <option value="">All Categories</option>
            </select>
        </div>
        <table id="firTable">
            <thead>
                <tr>
                    <th>Reference ID</th>
                    <th>Date</th>
                    <th>Category</th>
                    <th>Victim Name</th>
                    <th>Contact</th>
                    <th>Status</th>
                    <th>Update</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <!-- Details Modal -->
    <div class="modal" id="detailsModal">
        <div class="modal-content">
            <div class="modal-header">FIR Details</div>
            <div id="modalBody"></div>
            <div class="modal-footer">
                <button class="btn btn-update" onclick="closeModal()">Close</button>
            </div>
        </div>
    </div>

    <!-- Update Modal -->
    <div class="modal" id="updateModal">
        <div class="modal-content">
            <div class="modal-header">Update FIR Status</div>
            <div id="updateBody"></div>
            <div class="modal-footer">
                <button class="btn btn-update" onclick="saveUpdate()">OK</button>
                <button class="btn btn-update" onclick="closeUpdateModal()">Back</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBnMI6S8fig-fl8exIAt5tDz9qWWrWGHAM",
            authDomain: "crime-management-fdd43.firebaseapp.com",
            projectId: "crime-management-fdd43",
            storageBucket: "crime-management-fdd43.appspot.com",
            messagingSenderId: "990509285734",
            appId: "1:990509285734:web:4798f9666ff2dea537c8a7"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let selectedRecord = null;
        let selectedDocId = '';

        async function loadFIRData() {
            let tableBody = document.querySelector("#firTable tbody");
            tableBody.innerHTML = "";
            let categories = new Set();
            const snapshot = await db.collection("firs").get();
            snapshot.forEach(doc => {
                let record = doc.data();
                let statusClass = getStatusClass(record.status);
                let row = document.createElement("tr");
                row.innerHTML = `
                    <td class="refCol">${record.refID || record.refNo || ''}</td>
                    <td>${record.date || ''}</td>
                    <td>${record.category || ''}</td>
                    <td>${record.victimName || ''}</td>
                    <td>${record.victimContact || ''}</td>
                    <td class="${statusClass}">${record.status || 'Pending'}</td>
                    <td><button class="btn btn-update" onclick="openUpdateModal('${doc.id}','${record.refID || record.refNo}')">Update</button></td>
                `;
                row.querySelector('.refCol').onclick = () => showDetails(record);
                tableBody.appendChild(row);
                if(record.category) categories.add(record.category);
            });

            let categoryFilter = document.getElementById("categoryFilter");
            categoryFilter.innerHTML = '<option value="">All Categories</option>';
            categories.forEach(cat=>{
                let opt=document.createElement("option");
                opt.value=cat;
                opt.textContent=cat;
                categoryFilter.appendChild(opt);
            });
        }

        function getStatusClass(status){
            if(status==='Pending') return 'status-pending';
            if(status==='Arrested') return 'status-arrested';
            if(status==='Case Closed') return 'status-closed';
            return '';
        }

        function filterTable(){
            let searchValue = document.getElementById("searchInput").value.toLowerCase();
            let rows = document.querySelectorAll("#firTable tbody tr");
            rows.forEach(row=>{
                let ref=row.cells[0].textContent.toLowerCase();
                let name=row.cells[3].textContent.toLowerCase();
                row.style.display=(ref.includes(searchValue)||name.includes(searchValue))?"":"none";
            });
        }

        function filterByCategory(){
            let selected=document.getElementById("categoryFilter").value.toLowerCase();
            let rows=document.querySelectorAll("#firTable tbody tr");
            rows.forEach(row=>{
                let category=row.cells[2].textContent.toLowerCase();
                row.style.display=!selected || category===selected?"":"none";
            });
        }

        function showDetails(record){
            let body=`
                <p><strong>Reference ID:</strong> ${record.refNo || record.refID || ''}</p>
                <p><strong>Date:</strong> ${record.date || ''}</p>
                <p><strong>Category:</strong> ${record.category || ''}</p>
                <p><strong>Victim Name:</strong> ${record.victimName || ''}</p>
                <p><strong>Victim Contact:</strong> ${record.victimContact || ''}</p>
                <p><strong>Victim Address:</strong> ${record.victimAddress || ''}</p>
                <p><strong>Complaint:</strong> ${record.complaint || ''}</p>
                <p><strong>Status:</strong> ${record.status || 'Pending'}</p>
            `;
            if(record.criminalKnown==='Yes'){
                body+=`
                    <p><strong>Criminal Name:</strong> ${record.criminalDetails?.cName || ''}</p>
                    <p><strong>Criminal Age:</strong> ${record.criminalDetails?.cAge || ''}</p>
                    <p><strong>Criminal Address:</strong> ${record.criminalDetails?.cAddress || ''}</p>
                `;
            }
            if(record.suspectKnown==='Yes'){
                body+=`
                    <p><strong>Suspect Name:</strong> ${record.suspectDetails?.sName || ''}</p>
                    <p><strong>Suspect Age:</strong> ${record.suspectDetails?.sAge || ''}</p>
                    <p><strong>Suspect Address:</strong> ${record.suspectDetails?.sAddress || ''}</p>
                `;
            }
            document.getElementById("modalBody").innerHTML=body;
            document.getElementById("detailsModal").style.display="flex";
        }

        function closeModal(){ document.getElementById("detailsModal").style.display="none"; }

        function openUpdateModal(docId, refId){
            selectedDocId = docId;
            db.collection("firs").doc(docId).get().then(doc=>{
                selectedRecord = doc.data();
                let status = selectedRecord.status || 'Pending';
                let html=`<p><strong>Reference ID:</strong> ${refId}</p>`;
                if(status==='Pending'){
                    html+=`
                        <label>Criminal Found:</label>
                        <select id="criminalFound" class="input-field">
                            <option value="">Select</option>
                            <option value="Yes">Yes</option>
                            <option value="No">No</option>
                        </select>
                        <div id="criminalDetailsDiv" style="display:none;">
                            <input id="cName" class="input-field" placeholder="Criminal Name">
                            <input id="cAge" class="input-field" placeholder="Age">
                            <input id="cAddress" class="input-field" placeholder="Address">
                            <input id="cMarks" class="input-field" placeholder="Identification Marks">
                            <input id="cExtra" class="input-field" placeholder="Additional Details">
                        </div>
                    `;
                } else if(status==='Arrested'){
                    html+=`<textarea id="judgement" class="input-field" placeholder="Enter Judgement Details"></textarea>`;
                } else {
                    html+=`<p>Case Closed</p>`;
                }
                document.getElementById("updateBody").innerHTML = html;
                document.getElementById("updateModal").style.display="flex";

                if(status==='Pending'){
                    document.getElementById("criminalFound").onchange = function(){
                        document.getElementById("criminalDetailsDiv").style.display=this.value==='Yes'?'block':'none';
                    }
                }
            });
        }

        async function saveUpdate(){
            let status = selectedRecord.status || 'Pending';
            let updateData = {};
            if(status==='Pending'){
                let found = document.getElementById("criminalFound").value;
                if(found==='Yes'){
                    let cName=document.getElementById("cName").value.trim();
                    let cAge=document.getElementById("cAge").value.trim();
                    let cAddress=document.getElementById("cAddress").value.trim();
                    let cMarks=document.getElementById("cMarks").value.trim();
                    let cExtra=document.getElementById("cExtra").value.trim();
                    if(!cName||!cAge||!cAddress||!cMarks||!cExtra){
                        alert("Please enter all criminal details to update status.");
                        return;
                    }
                    updateData.status='Arrested';
                    updateData.criminalKnown='Yes';
                    updateData.criminalDetails={cName,cAge,cAddress,cMarks,cExtra};
                } else if(found==='No'){
                    updateData.status='Pending';
                } else {
                    alert("Select Yes or No for Criminal Found.");
                    return;
                }
            } else if(status==='Arrested'){
                let judgement=document.getElementById("judgement").value.trim();
                if(judgement===''){ alert("Enter judgement details to close case."); return;}
                updateData.status='Case Closed';
                updateData.judgement=judgement;
            }
            await db.collection("firs").doc(selectedDocId).update(updateData);
            document.getElementById("updateModal").style.display="none";
            loadFIRData();
        }

        function closeUpdateModal(){ document.getElementById("updateModal").style.display="none"; }

        window.onload=loadFIRData;
    </script>
</body>
</html>

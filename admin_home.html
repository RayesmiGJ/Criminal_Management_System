<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Police Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/admin_home.css">
</head>
<body>
<div class="bg-glow"></div>
<nav>
    <div class="logo-area"><i class="fas fa-shield-halved"></i><span>ADMIN PANEL</span></div>
    <div class="nav-links" id="navLinks">
        <a href="admin_home.html" class="active">Home</a>
        <a href="about_us.html">About Us</a>
        <a href="martyrs.html">Martyrs</a>
        <a href="contact_us.html">Contact Us</a>
        <div class="user-profile-container">
            <div class="user-info"><i class="fas fa-user-cog"></i><span id="userNameDisplay">Admin</span><i class="fas fa-chevron-down" style="font-size: 10px;"></i></div>
            <div class="profile-tooltip">
                <div class="profile-header"><div class="profile-avatar"><i class="fas fa-user-cog"></i></div><h4 id="profileName">Admin</h4><p id="profileRank">Administrator</p></div>
                <div class="profile-details" id="profileDetails"></div>
            </div>
        </div>
        <button class="logout-btn" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
    <button class="mobile-menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>
</nav>

<div class="header-section">
    <h1>Admin Control Panel <span class="admin-badge">ADMIN</span></h1>
    <p>Manage officers, view logs, and oversee system operations</p>
</div>

<div class="dashboard-grid">
    <div class="card" onclick="navigateTo('log_details.html')"><i class="fa-solid fa-history card-icon"></i><span class="card-title">Officer Activity Logs</span></div>
    <div class="card" onclick="openOfficerModal()"><i class="fa-solid fa-user-plus card-icon"></i><span class="card-title">Manage Officers</span></div>
</div>

<!-- Modal for Managing Officers -->
<div id="officerModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2><i class="fas fa-user-shield"></i> Manage Officers</h2>
            <span class="close-modal" onclick="closeOfficerModal()">&times;</span>
        </div>
        <div id="officerForm">
            <input type="hidden" id="editOfficerId">
            <input type="text" id="officerName" placeholder="Full Name" required>
            <input type="text" id="officerRank" placeholder="Rank" required>
            <input type="text" id="officerBadge" placeholder="Badge Number" required>
            <input type="text" id="officerPhone" placeholder="Phone Number" required>
            <input type="email" id="officerEmail" placeholder="Email" required>
            <input type="text" id="officerDivision" placeholder="Division" required>
            <input type="text" id="officerUnit" placeholder="Unit" required>
            <input type="text" id="officerJoinDate" placeholder="Join Date (YYYY-MM-DD)" required>
            <input type="text" id="officerId" placeholder="Officer ID (unique)" required>
            <input type="password" id="officerPassword" placeholder="Password" required>
            <button onclick="saveOfficer()">Save Officer</button>
        </div>
        <div class="officer-list" id="officerList">
            <p>Loading officers...</p>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="js/admin_home.js"></script>
</body>
</html>

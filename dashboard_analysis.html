<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Analysis | SecureCloud Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-bg: #0f172a;
            --secondary-bg: #1e293b;
            --accent-gold: #fbbf24;
            --accent-blue: #38bdf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --glass: rgba(30, 41, 59, 0.7);
            --danger: #ef4444;
            --warning: #f59e0b;
            --success: #22c55e;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-main);
            min-height: 100vh;
            background-image: radial-gradient(circle at top right, #1e293b 0%, #0f172a 100%);
            background-attachment: fixed;
        }

        /* Navbar */
        nav {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: center;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky; top: 0; z-index: 1000;
        }

        nav a {
            color: var(--text-dim);
            text-decoration: none;
            margin: 0 20px;
            font-weight: 600;
            transition: 0.3s;
        }

        nav a:hover, nav a.active { color: var(--accent-gold); }

        .title {
            text-align: center;
            padding: 40px 0 10px;
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(to right, #fff, var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Search Section */
        .search-container {
            max-width: 900px;
            margin: 20px auto;
            background: var(--glass);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .search-box {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .search-input {
            flex: 1;
            padding: 15px;
            background: #0b1120;
            border: 1px solid #334155;
            color: white;
            border-radius: 10px;
            font-size: 1rem;
            outline: none;
        }

        .search-input:focus { border-color: var(--accent-blue); }

        .search-btn {
            background: linear-gradient(135deg, var(--accent-blue), #0284c7);
            color: white;
            border: none;
            padding: 0 25px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }

        .search-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(56, 189, 248, 0.3); }

        .filters {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .filter-select {
            padding: 10px;
            background: #0b1120;
            border: 1px solid #334155;
            color: var(--text-dim);
            border-radius: 8px;
            font-size: 0.85rem;
            outline: none;
            cursor: pointer;
        }

        /* Results Area */
        .results-container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .results-stats {
            color: var(--accent-gold);
            margin-bottom: 20px;
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Case Cards */
        .case-card {
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 25px;
            transition: 0.3s;
            position: relative;
        }

        .case-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-blue);
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }

        .case-card.high-priority { border-left: 5px solid var(--danger); }
        .case-card.medium-priority { border-left: 5px solid var(--warning); }
        .case-card.low-priority { border-left: 5px solid var(--success); }

        .case-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .case-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .priority-badge {
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .priority-high { background: rgba(239, 68, 68, 0.15); color: var(--danger); border: 1px solid var(--danger); }
        .priority-medium { background: rgba(245, 158, 11, 0.15); color: var(--warning); border: 1px solid var(--warning); }
        .priority-low { background: rgba(34, 197, 94, 0.15); color: var(--success); border: 1px solid var(--success); }

        .case-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 10px;
        }

        .detail-item { font-size: 0.9rem; color: var(--text-dim); }
        .detail-label { color: var(--accent-blue); font-weight: 600; margin-right: 5px; }

        .complaint-box {
            color: var(--text-main);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 20px;
            padding-left: 10px;
            border-left: 2px solid var(--accent-blue);
        }

        /* Match Score Section */
        .match-score {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255,255,255,0.03);
            padding: 10px 15px;
            border-radius: 8px;
        }

        .score-text { font-size: 0.8rem; font-weight: 700; color: var(--accent-gold); white-space: nowrap; }

        .score-bar {
            flex: 1;
            height: 8px;
            background: #0b1120;
            border-radius: 10px;
            overflow: hidden;
        }

        .score-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-blue), #60a5fa);
            box-shadow: 0 0 15px var(--accent-blue);
            transition: width 1s ease-out;
        }

        /* Loading */
        .loading { text-align: center; padding: 50px; }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid var(--accent-blue);
            border-radius: 50%;
            width: 50px; height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .highlight {
            background: rgba(251, 191, 36, 0.3);
            color: #fff;
            padding: 0 4px;
            border-radius: 2px;
            font-weight: 600;
        }
    </style>
</head>
<body>

<nav>
    <a href="home.html">Home</a>
    <a href="about_us.html">About Us</a>
    <a href="martyrs.html">Martyrs</a>
    <a href="contact_us.html">Contact Us</a>
</nav>

<div class="title">Intelligent Pattern Analysis</div>

<div class="search-container">
    <div class="search-box">
        <input type="text" id="searchInput" class="search-input" placeholder="Query heuristic patterns: 'gang assault', 'night robbery', 'unidentified suspect'...">
        <button class="search-btn" onclick="performSearch()">
            <i class="fas fa-satellite-dish"></i> Run Analysis
        </button>
    </div>
    
    <div class="filters">
        <select id="categoryFilter" class="filter-select">
            <option value="">All Categories</option>
            <option value="Murder">Murder</option>
            <option value="Theft">Theft</option>
            <option value="Assault">Assault</option>
            <option value="Fraud">Fraud</option>
            <option value="Harassment">Harassment</option>
        </select>
        
        <select id="statusFilter" class="filter-select">
            <option value="">All Status</option>
            <option value="Pending">Under Investigation</option>
            <option value="Arrested">Suspect in Custody</option>
            <option value="Case Closed">Judicially Closed</option>
        </select>
        
        <select id="priorityFilter" class="filter-select">
            <option value="">Threat Level</option>
            <option value="high">Critical Level</option>
            <option value="medium">Standard Level</option>
            <option value="low">Low Level</option>
        </select>
        
        <select id="sortBy" class="filter-select">
            <option value="relevance">Sort by Match %</option>
            <option value="priority">Sort by Threat</option>
            <option value="date">Sort by Incident Date</option>
        </select>
    </div>
</div>

<div class="results-container">
    <div class="results-stats" id="resultsStats"><i class="fas fa-info-circle"></i> Awaiting heuristic search input...</div>
    <div id="searchResults"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<script>
    // Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyBnMI6S8fig-fl8exIAt5tDz9qWWrWGHAM",
        authDomain: "crime-management-fdd43.firebaseapp.com",
        projectId: "crime-management-fdd43",
        storageBucket: "crime-management-fdd43.firebasestorage.app",
        messagingSenderId: "990509285734",
        appId: "1:990509285734:web:4798f9666ff2dea537c8a7",
        measurementId: "G-QTG266883M",
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Heuristic Engine Class
    class HeuristicSearch {
        constructor() {
            this.keywords = {
                'theft': ['stolen', 'snatched', 'burglary', 'stole', 'missing'],
                'violence': ['weapon', 'attack', 'blood', 'gun', 'knife', 'shot'],
                'cyber': ['hack', 'fraud', 'online', 'scam', 'transaction']
            };
        }

        calculateMatch(query, data) {
            let score = 0;
            const terms = query.toLowerCase().split(' ');
            const content = (data.complaint + ' ' + data.category + ' ' + data.victimName).toLowerCase();
            
            terms.forEach(t => {
                if (content.includes(t)) score += 25;
            });
            
            return Math.min(score, 100);
        }

        getPriority(data) {
            if (data.category === 'Murder' || data.category === 'Assault') return {level: 'high', label: 'Critical Threat'};
            if (data.status === 'Pending') return {level: 'medium', label: 'Active Case'};
            return {level: 'low', label: 'Closed/Standard'};
        }

        highlight(text, query) {
            if (!text || !query) return text;
            const terms = query.split(' ');
            let result = text;
            terms.forEach(t => {
                if(t.length > 2) {
                    const regex = new RegExp(`(${t})`, 'gi');
                    result = result.replace(regex, '<span class="highlight">$1</span>');
                }
            });
            return result;
        }
    }

    const analyzer = new HeuristicSearch();

    async function performSearch() {
        const query = document.getElementById('searchInput').value.trim();
        if (!query) return;

        const resultsUI = document.getElementById('searchResults');
        resultsUI.innerHTML = '<div class="loading"><div class="spinner"></div><p>Scanning Central Database...</p></div>';
        
        try {
            const snap = await db.collection('firs').get();
            const results = snap.docs.map(doc => {
                const data = doc.data();
                const score = analyzer.calculateMatch(query, data);
                const prio = analyzer.getPriority(data);
                return { ...data, score, prio };
            }).filter(c => c.score > 0);

            // Sorting logic
            const sortBy = document.getElementById('sortBy').value;
            if(sortBy === 'relevance') results.sort((a,b) => b.score - a.score);
            if(sortBy === 'date') results.sort((a,b) => new Date(b.date) - new Date(a.date));

            renderResults(results, query);
        } catch (e) {
            resultsUI.innerHTML = '<p style="text-align:center; color:var(--danger);">Secure Connection Failed.</p>';
        }
    }

    function renderResults(cases, query) {
        const stats = document.getElementById('resultsStats');
        const list = document.getElementById('searchResults');
        stats.innerHTML = `<i class="fas fa-check-circle"></i> Heuristic scanning complete: ${cases.length} Match(es)`;

        if (cases.length === 0) {
            list.innerHTML = '<div style="text-align:center; padding:100px; opacity:0.3;">NO PATTERNS IDENTIFIED</div>';
            return;
        }

        list.innerHTML = cases.map(c => `
            <div class="case-card ${c.prio.level}-priority">
                <div class="case-header">
                    <h3 class="case-title"><i class="fas fa-id-badge"></i> ${c.refID || c.refNo} — ${analyzer.highlight(c.category, query)}</h3>
                    <div class="priority-badge priority-${c.prio.level}">${c.prio.label}</div>
                </div>
                <div class="case-details">
                    <div class="detail-item"><span class="detail-label">Registry:</span> ${c.date}</div>
                    <div class="detail-item"><span class="detail-label">Complainant:</span> ${c.victimName}</div>
                    <div class="detail-item"><span class="detail-label">Investigation:</span> ${c.status || 'Active'}</div>
                </div>
                <div class="complaint-box">${analyzer.highlight(c.complaint, query)}</div>
                <div class="match-score">
                    <div class="score-text">Pattern Reliability: ${c.score}%</div>
                    <div class="score-bar"><div class="score-fill" style="width: ${c.score}%"></div></div>
                </div>
            </div>
        `).join('');
    }

    document.getElementById('searchInput').addEventListener('keypress', e => e.key === 'Enter' && performSearch());
</script>
</body>
</html>

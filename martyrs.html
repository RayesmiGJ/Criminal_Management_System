<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Martyrs | Police Records Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/martyrs.css">
</head>
<body>
<script src="auth-check.js"></script>
<nav>
    <a href="home.html">Home</a>
    <a href="about_us.html">About Us</a>
    <a href="martyrs.html" class="active">Martyrs</a>
    <a href="contact_us.html">Contact Us</a>
</nav>

<div class="header-section">
    <h1>MARTYRS</h1>
    <small>Honoring those who gave their lives in the line of duty</small>
</div>

<div class="btn-container">
    <button class="btn" id="openModalBtn">
        <i class="fas fa-plus"></i> Add Entry
    </button>
</div>

<div class="table-container">
    <table id="martyrsTable">
        <thead>
            <tr>
                <th>S.No</th>
                <th>Officer Details</th>
                <th>Rank</th>
                <th>Service Dates</th>
                <th>Martyrdom Info</th>
                <th>Incident Summary</th>
                <th>Photo</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <tr><td colspan="7" class="loading">Loading martyrs...</td></tr>
        </tbody>
    </table>
</div>

<!-- Add Modal -->
<div id="myModal" class="modal">
    <div class="modal-content">
        <span class="close" id="closeModal">&times;</span>
        <h3><i class="fas fa-ribbon"></i> Add New Record</h3>
        <form id="addMartyrForm">
            <label>Officer Name *</label>
            <input type="text" id="name" placeholder="Full Name" required>

            <label>Rank *</label>
            <input type="text" id="rank" placeholder="Designation" required>

            <div class="flex-row">
                <div>
                    <label>Date of Joining *</label>
                    <input type="date" id="joinDate" required>
                </div>
                <div>
                    <label>Date of Martyrdom *</label>
                    <input type="date" id="martyrDate" required>
                </div>
            </div>

            <label>Place of Incident *</label>
            <input type="text" id="place" placeholder="City / Facility" required>

            <label>Brief of Incident *</label>
            <textarea id="incident" rows="3" placeholder="Description of the event..." required></textarea>

            <label>Photo (optional, stored as Base64 in Firestore)</label>
            <div class="image-preview-area" id="photoPreviewArea" onclick="document.getElementById('photoInput').click()">
                <i class="fas fa-camera" style="font-size: 2rem; color: #38bdf8;"></i>
                <p>Click to select image</p>
                <img id="photoPreview" style="display: none; max-width: 100%; border-radius: 12px;">
            </div>
            <input type="file" id="photoInput" accept="image/*" style="display: none;" onchange="previewImage(this)">
            <button type="button" id="removePhotoBtn" class="remove-image" style="display: none;" onclick="removePhoto()">Remove Photo</button>

            <button type="submit" class="btn">Submit Record</button>
        </form>
    </div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="js/martyrs.js"></script>
</body>
</html>

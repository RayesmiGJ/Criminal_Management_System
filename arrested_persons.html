<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arrested Persons | SecureCloud Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/arrested_persons.css">
    </head>
<body>
<script src="auth-check.js"></script>
<nav>
    <a href="home.html">Home</a>
    <a href="about_us.html">About Us</a>
    <a href="martyrs.html">Martyrs</a>
    <a href="contact_us.html">Contact Us</a>
</nav>

<div class="container">
    <div class="page-header">
        <h1><i class="fas fa-handcuffs"></i> Arrested Persons Database</h1>
        <p>Complete record of arrested criminals | Click any card for full details</p>
    </div>

    <!-- Filter Bar -->
    <div class="filter-bar">
        <input type="text" id="searchInput" placeholder="Search by Ref ID or Criminal Name..." onkeyup="filterCards()">
        <select id="categoryFilter" onchange="filterCards()">
            <option value="">All Crime Categories</option>
        </select>
        <input type="date" id="dateFrom" placeholder="From Date">
        <input type="date" id="dateTo" placeholder="To Date">
        <button class="btn-export" onclick="exportToCSV()"><i class="fas fa-download"></i> Export CSV</button>
    </div>

    <!-- Arrested Persons Grid (Card Layout) -->
    <div id="arrestedGrid" class="arrested-grid"></div>
</div>

<!-- Details Modal -->
<div class="modal" id="detailsModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3><i class="fas fa-user-secret"></i> Criminal Dossier</h3>
            <button class="close-modal" onclick="closeModal()">&times;</button>
        </div>
        <div id="modalBody"></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>

<script src="js/arrested_persons.js"></script>
</body>
</html>

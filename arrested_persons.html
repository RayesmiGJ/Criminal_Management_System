<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arrested Persons Records | SecureCloud</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-bg: #0f172a;
            --secondary-bg: #1e293b;
            --accent-gold: #fbbf24;
            --accent-blue: #38bdf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --glass: rgba(30, 41, 59, 0.7);
            --success: #22c55e;
            --case-closed: #94a3b8;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-main);
            min-height: 100vh;
            background-image: radial-gradient(circle at top right, #1e293b 0%, #0f172a 100%);
            background-attachment: fixed;
        }

        /* Navigation */
        nav {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: center;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky; top: 0; z-index: 1000;
        }

        nav a {
            color: var(--text-dim);
            text-decoration: none;
            margin: 0 20px;
            font-weight: 600;
            transition: 0.3s;
        }

        nav a:hover, nav a.active { color: var(--accent-gold); }

        h2 {
            text-align: center;
            padding: 40px 0 10px;
            font-size: 2.2rem;
            background: linear-gradient(to right, #fff, var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        /* Search & Filter Header */
        .search-filter {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            background: var(--glass);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        input, select {
            background: #0b1120;
            border: 1px solid #334155;
            color: white;
            padding: 12px;
            border-radius: 8px;
            outline: none;
            flex: 1;
        }

        input:focus { border-color: var(--accent-blue); }

        /* Table Design */
        .table-wrapper {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        table { width: 100%; border-collapse: collapse; text-align: left; }

        th {
            background: rgba(255, 255, 255, 0.05);
            color: var(--accent-gold);
            padding: 18px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }

        td {
            padding: 15px 18px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--text-dim);
        }

        tr:hover td { background: rgba(255, 255, 255, 0.02); color: white; }

        /* Status Colors */
        .status-pill {
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.8rem;
        }
        .status-arrested { color: var(--success); }
        .status-closed { color: var(--case-closed); }

        .btn-view {
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent-blue);
            border: 1px solid var(--accent-blue);
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-view:hover { background: var(--accent-blue); color: #000; }

        /* Modal Design */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal-content {
            background: var(--secondary-bg);
            padding: 30px;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
            border: 1px solid var(--accent-blue);
            box-shadow: 0 0 40px rgba(56, 189, 248, 0.2);
        }

        .modal-header {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--accent-gold);
            margin-bottom: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }

        #modalBody p {
            margin: 12px 0;
            padding-bottom: 6px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        #modalBody strong { color: var(--accent-blue); margin-right: 5px; }

        .modal-footer { margin-top: 20px; text-align: right; }

    </style>
</head>
<body>

<nav>
    <a href="home.html">Home</a>
    <a href="about_us.html">About Us</a>
    <a href="martyrs.html">Martyrs</a>
    <a href="contact_us.html">Contact Us</a>
</nav>

<div class="container">
    <h2><i class="fas fa-handcuffs"></i> Arrested Persons Archive</h2>

    

    <div class="search-filter">
        <input type="text" id="searchInput" placeholder="Search by Reference ID or Name..." onkeyup="filterTable()">
        <select id="categoryFilter" onchange="filterByCategory()">
            <option value="">All Crime Categories</option>
        </select>
    </div>

    <div class="table-wrapper">
        <table id="arrestedTable">
            <thead>
                <tr>
                    <th><i class="fas fa-hashtag"></i> Ref ID</th>
                    <th><i class="fas fa-user-tag"></i> Criminal Name</th>
                    <th><i class="fas fa-id-card"></i> Age</th>
                    <th><i class="fas fa-info-circle"></i> Status</th>
                    <th><i class="fas fa-gavel"></i> Judgement</th>
                    <th><i class="fas fa-eye"></i> Details</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>
</div>

<div class="modal" id="detailsModal">
    <div class="modal-content">
        <div class="modal-header"><i class="fas fa-user-secret"></i> Subject Dossier</div>
        <div id="modalBody"></div>
        <div class="modal-footer">
            <button class="btn-view" onclick="closeModal()" style="background: transparent;">Close Dossier</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBnMI6S8fig-fl8exIAt5tDz9qWWrWGHAM",
        authDomain: "crime-management-fdd43.firebaseapp.com",
        projectId: "crime-management-fdd43",
        storageBucket: "crime-management-fdd43.appspot.com",
        messagingSenderId: "990509285734",
        appId: "1:990509285734:web:4798f9666ff2dea537c8a7"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function loadArrestedPersons() {
        let tbody = document.querySelector("#arrestedTable tbody");
        tbody.innerHTML = "<tr><td colspan='6' style='text-align:center;'>Accessing Encrypted Records...</td></tr>";
        
        let categories = new Set();
        const snapshot = await db.collection("firs")
            .where("status", "in", ["Arrested", "Case Closed"])
            .get();

        tbody.innerHTML = "";
        snapshot.forEach(doc => {
            let record = doc.data();
            if(record.criminalKnown === "Yes" && record.criminalDetails){
                let statusClass = record.status === 'Arrested' ? 'status-arrested' : 'status-closed';
                let row = document.createElement("tr");
                row.setAttribute('data-category', record.category || '');
                row.innerHTML = `
                    <td><strong>${record.refID || record.refNo || ''}</strong></td>
                    <td>${record.criminalDetails.cName || ''}</td>
                    <td>${record.criminalDetails.cAge || ''}</td>
                    <td><span class="status-pill ${statusClass}">${record.status}</span></td>
                    <td>${record.status === "Case Closed" ? (record.judgement || "Verdict Rendered") : "<em>Pending Trial</em>"}</td>
                    <td><button class="btn-view" onclick='showDetails(${JSON.stringify(record)})'>View</button></td>
                `;
                tbody.appendChild(row);
                if(record.category) categories.add(record.category);
            }
        });

        // Populate Category Filter
        let categoryFilter = document.getElementById("categoryFilter");
        categoryFilter.innerHTML = '<option value="">All Crime Categories</option>';
        categories.forEach(cat => {
            let opt = document.createElement("option");
            opt.value = cat;
            opt.textContent = cat;
            categoryFilter.appendChild(opt);
        });
    }

    function filterTable(){
        let searchValue = document.getElementById("searchInput").value.toLowerCase();
        let rows = document.querySelectorAll("#arrestedTable tbody tr");
        rows.forEach(row => {
            let ref = row.cells[0].textContent.toLowerCase();
            let name = row.cells[1].textContent.toLowerCase();
            row.style.display = (ref.includes(searchValue) || name.includes(searchValue)) ? "" : "none";
        });
    }

    function filterByCategory(){
        let selected = document.getElementById("categoryFilter").value.toLowerCase();
        let rows = document.querySelectorAll("#arrestedTable tbody tr");
        rows.forEach(row => {
            let rowCat = row.getAttribute('data-category').toLowerCase();
            row.style.display = (!selected || rowCat === selected) ? "" : "none";
        });
    }

    function showDetails(record){
        let body = `
            <p><strong><i class="fas fa-hashtag"></i> Case ID:</strong> ${record.refID || record.refNo || ''}</p>
            <p><strong><i class="fas fa-folder"></i> Offense:</strong> ${record.category || ''}</p>
            <p><strong><i class="fas fa-user-tag"></i> Name:</strong> ${record.criminalDetails?.cName || ''}</p>
            <p><strong><i class="fas fa-birthday-cake"></i> Age:</strong> ${record.criminalDetails?.cAge || ''}</p>
            <p><strong><i class="fas fa-map-marker-alt"></i> Address:</strong> ${record.criminalDetails?.cAddress || ''}</p>
            <p><strong><i class="fas fa-fingerprint"></i> ID Marks:</strong> ${record.criminalDetails?.cMarks || 'None Listed'}</p>
            <p><strong><i class="fas fa-notes-medical"></i> Profile:</strong> ${record.criminalDetails?.cExtra || 'N/A'}</p>
            <p><strong><i class="fas fa-info-circle"></i> Status:</strong> ${record.status}</p>
        `;
        if(record.status === "Case Closed"){
            body += `<p style="background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px;"><strong><i class="fas fa-balance-scale"></i> Court Judgement:</strong><br>${record.judgement || 'Finalized'}</p>`;
        }
        document.getElementById("modalBody").innerHTML = body;
        document.getElementById("detailsModal").style.display = "flex";
    }

    function closeModal(){ document.getElementById("detailsModal").style.display="none"; }
    window.onload = loadArrestedPersons;
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Arrested Persons Records</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f8f8f8;
            margin: 0;
            padding: 0;
        }
        h2 {
            text-align: center;
            padding: 15px;
            background: #2c3e50;
            color: white;
            margin: 0;
        }
        .container {
            padding: 20px;
        }
        .search-bar {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
        }
       .search-filter {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
                }
        input {
            padding: 8px;
            font-size: 14px;
            width: 300px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background: #34495e;
            color: white;
        }
        tr:hover {
            background: #e6f0ff;
        }
        .btn {
            padding: 5px 10px;
            font-size: 13px;
            background: #3498db;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 4px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 6px;
            max-width: 500px;
            width: 90%;
        }
        .modal-header { font-weight: bold; margin-bottom: 10px; text-align:center; }
        .modal-footer { margin-top: 15px; text-align: right; }
    </style>
</head>
<body>
    
    <h2>Arrested Persons Records</h2>
    <div class="container">
       <div class="search-filter">
            <input type="text" id="searchInput" placeholder="Search by Reference ID or Criminal Name" onkeyup="filterTable()">
            <select id="categoryFilter" onchange="filterByCategory()">
                <option value="">All Categories</option>
            </select>
        </div>
        <table id="arrestedTable">
            <thead>
                <tr>
                    <th>Reference ID</th>
                    <th>Criminal Name</th>
                    <th>Age</th>
                    <th>Status</th>
                    <th>Judgement</th>
                    <th>View Details</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <!-- Details Modal -->
    <div class="modal" id="detailsModal">
        <div class="modal-content">
            <div class="modal-header">Arrested Person Details</div>
            <div id="modalBody"></div>
            <div class="modal-footer">
                <button class="btn" onclick="closeModal()">Close</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBnMI6S8fig-fl8exIAt5tDz9qWWrWGHAM",
            authDomain: "crime-management-fdd43.firebaseapp.com",
            projectId: "crime-management-fdd43",
            storageBucket: "crime-management-fdd43.appspot.com",
            messagingSenderId: "990509285734",
            appId: "1:990509285734:web:4798f9666ff2dea537c8a7"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function loadArrestedPersons() {
            let tbody = document.querySelector("#arrestedTable tbody");
            tbody.innerHTML = "";
            const snapshot = await db.collection("firs")
                .where("status", "in", ["Arrested", "Case Closed"])
                .get();

            snapshot.forEach(doc => {
                let record = doc.data();
                if(record.criminalKnown === "Yes" && record.criminalDetails){
                    let row = document.createElement("tr");
                    row.innerHTML = `
                        <td>${record.refID || record.refNo || ''}</td>
                        <td>${record.criminalDetails.cName || ''}</td>
                        <td>${record.criminalDetails.cAge || ''}</td>
                        <td>${record.status}</td>
                        <td>${record.status === "Case Closed" ? (record.judgement || "N/A") : "Awaiting Judgement"}</td>
                        <td><button class="btn" onclick='showDetails(${JSON.stringify(record)})'>View</button></td>
                    `;
                    tbody.appendChild(row);
                }
            });
        }

        function filterTable(){
            let searchValue = document.getElementById("searchInput").value.toLowerCase();
            let rows = document.querySelectorAll("#arrestedTable tbody tr");
            rows.forEach(row=>{
                let ref=row.cells[0].textContent.toLowerCase();
                let name=row.cells[1].textContent.toLowerCase();
                row.style.display=(ref.includes(searchValue)||name.includes(searchValue))?"":"none";
            });
        }

        function showDetails(record){
            let body=`
                <p><strong>Reference ID:</strong> ${record.refID || record.refNo || ''}</p>
                <p><strong>Date:</strong> ${record.date || ''}</p>
                <p><strong>Category:</strong> ${record.category || ''}</p>
                <p><strong>Victim Name:</strong> ${record.victimName || ''}</p>
                <p><strong>Criminal Name:</strong> ${record.criminalDetails?.cName || ''}</p>
                <p><strong>Criminal Age:</strong> ${record.criminalDetails?.cAge || ''}</p>
                <p><strong>Address:</strong> ${record.criminalDetails?.cAddress || ''}</p>
                <p><strong>Identification Marks:</strong> ${record.criminalDetails?.cMarks || ''}</p>
                <p><strong>Extra Details:</strong> ${record.criminalDetails?.cExtra || ''}</p>
                <p><strong>Status:</strong> ${record.status}</p>
            `;
            if(record.status === "Case Closed"){
                body += `<p><strong>Judgement:</strong> ${record.judgement || 'Not Available'}</p>`;
            }
            document.getElementById("modalBody").innerHTML = body;
            document.getElementById("detailsModal").style.display = "flex";
        }

        function closeModal(){ document.getElementById("detailsModal").style.display="none"; }

        window.onload = loadArrestedPersons;
    </script>
</body>
</html>
